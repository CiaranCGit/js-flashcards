<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f23">
<title>JS Interview Flashcards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f23;
    color: #e0e0e0;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    touch-action: pan-y;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  }

  /* === HEADER === */
  .header { text-align: center; padding: 16px 16px 4px; width: 100%; }
  .header h1 {
    font-size: 20px;
    background: linear-gradient(to right, #4ecdc4, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* === MODE SWITCHER === */
  .mode-switcher {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 8px 16px 4px;
    width: 100%;
    max-width: 400px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #2a2a3e;
    background: transparent;
    color: #888;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn:first-child { border-radius: 10px 0 0 10px; }
  .mode-btn:last-child { border-radius: 0 10px 10px 0; }
  .mode-btn:not(:first-child) { border-left: none; }
  .mode-btn.active {
    background: #4ecdc4;
    color: #0f0f23;
    border-color: #4ecdc4;
  }

  /* === STREAK === */
  .streak-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 6px 16px;
    font-size: 13px;
    color: #888;
  }
  .streak-fire { font-size: 18px; }
  .streak-num { color: #f59e0b; font-weight: 700; }
  .streak-label { color: #666; font-size: 11px; }

  /* === STATS === */
  .stats {
    display: flex;
    gap: 0;
    justify-content: center;
    padding: 4px 16px 8px;
    width: 100%;
    max-width: 400px;
  }
  .stat {
    text-align: center;
    flex: 1;
    padding: 6px 0;
  }
  .stat .num { font-size: 22px; font-weight: 800; }
  .stat .label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat.know .num { color: #4ecdc4; }
  .stat.learning .num { color: #f59e0b; }
  .stat.remaining .num { color: #666; }

  /* === PROGRESS === */
  .progress-bar { width: calc(100% - 32px); max-width: 400px; height: 6px; background: #1a1a2e; border-radius: 3px; }
  .progress-fill { height: 100%; background: linear-gradient(to right, #4ecdc4, #a855f7); border-radius: 3px; transition: width 0.4s ease; }

  /* === FILTERS === */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 16px;
    width: 100%;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #2a2a3e;
    background: transparent;
    color: #888;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .filter-btn.active { background: #4ecdc4; color: #0f0f23; border-color: #4ecdc4; font-weight: 700; }

  /* === CARD === */
  .card-wrapper {
    width: 100%;
    max-width: 440px;
    padding: 8px 16px;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .card-container {
    perspective: 1200px;
    width: 100%;
    height: 280px;
    cursor: pointer;
    position: relative;
  }
  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .card.flipped { transform: rotateY(180deg); }

  /* Swipe feedback */
  .card.swipe-left { transform: translateX(-100px) rotate(-5deg); opacity: 0; transition: all 0.3s ease; }
  .card.swipe-right { transform: translateX(100px) rotate(5deg); opacity: 0; transition: all 0.3s ease; }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 24px 20px;
    text-align: center;
    overflow-y: auto;
  }
  .card-front {
    background: linear-gradient(145deg, #1a1a3e, #1e1e4a);
    border: 1px solid #2a2a4a;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .card-back {
    background: linear-gradient(145deg, #1a2e1a, #1e3a1e);
    border: 1px solid #2d5a2d;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transform: rotateY(180deg);
  }
  .card-topic {
    position: absolute;
    top: 14px;
    left: 18px;
    font-size: 10px;
    color: #4ecdc4;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .card-number {
    position: absolute;
    top: 14px;
    right: 18px;
    font-size: 10px;
    color: #555;
  }
  .card-difficulty {
    position: absolute;
    bottom: 14px;
    left: 18px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .diff-new { background: #333; color: #888; }
  .diff-learning { background: #3d2e00; color: #f59e0b; }
  .diff-known { background: #0d2e2a; color: #4ecdc4; }

  .card-text {
    font-size: 17px;
    line-height: 1.55;
    max-width: 100%;
    word-wrap: break-word;
  }
  .card-front .card-text { color: #fff; font-weight: 500; }
  .card-back .card-text { color: #c0e8c0; font-size: 15px; }
  .card-hint {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-size: 10px;
    color: #444;
  }

  /* === FEEDBACK TOAST === */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    padding: 16px 32px;
    border-radius: 16px;
    font-size: 24px;
    font-weight: 800;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  .toast.toast-again { background: rgba(220,38,38,0.9); color: white; }
  .toast.toast-hard { background: rgba(245,158,11,0.9); color: #1a1a2e; }
  .toast.toast-good { background: rgba(78,205,196,0.9); color: #1a1a2e; }
  .toast.toast-correct { background: rgba(78,205,196,0.9); color: #1a1a2e; }
  .toast.toast-wrong { background: rgba(220,38,38,0.9); color: white; }

  /* === ACTIONS === */
  .actions {
    display: flex;
    gap: 10px;
    padding: 8px 16px 12px;
    width: 100%;
    max-width: 440px;
    justify-content: center;
  }
  .action-btn {
    flex: 1;
    padding: 14px 8px;
    border-radius: 14px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    max-width: 130px;
  }
  .action-btn:active { transform: scale(0.95); }
  .btn-again { background: #dc2626; color: white; }
  .btn-hard { background: #f59e0b; color: #1a1a2e; }
  .btn-good { background: #4ecdc4; color: #1a1a2e; }

  /* === QUIZ MODE (Multiple Choice) === */
  .quiz-area {
    width: 100%;
    max-width: 440px;
    padding: 8px 16px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .quiz-question-box {
    background: linear-gradient(145deg, #1a1a3e, #1e1e4a);
    border: 1px solid #2a2a4a;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    position: relative;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .quiz-question-box .card-topic { position: absolute; top: 14px; left: 18px; }
  .quiz-question-box .card-number { position: absolute; top: 14px; right: 18px; }
  .quiz-question-box .card-difficulty { position: absolute; bottom: 14px; left: 18px; }
  .quiz-question-text {
    font-size: 17px;
    line-height: 1.55;
    color: #fff;
    font-weight: 500;
    max-width: 100%;
    word-wrap: break-word;
  }
  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 4px 0;
  }
  .quiz-option {
    width: 100%;
    min-height: 52px;
    padding: 14px 16px;
    border-radius: 14px;
    border: 2px solid #2a2a4a;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 14px;
    line-height: 1.45;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    word-wrap: break-word;
  }
  .quiz-option:active { transform: scale(0.98); }
  .quiz-option.correct {
    border-color: #4ecdc4;
    background: rgba(78,205,196,0.15);
    color: #4ecdc4;
  }
  .quiz-option.wrong {
    border-color: #dc2626;
    background: rgba(220,38,38,0.15);
    color: #dc2626;
  }
  .quiz-option.disabled { pointer-events: none; opacity: 0.7; }

  /* === TYPE MODE === */
  .type-area {
    width: 100%;
    max-width: 440px;
    padding: 8px 16px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  .type-question-box {
    background: linear-gradient(145deg, #1a1a3e, #1e1e4a);
    border: 1px solid #2a2a4a;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 24px 20px;
    text-align: center;
    position: relative;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  .type-question-box .card-topic { position: absolute; top: 14px; left: 18px; }
  .type-question-box .card-number { position: absolute; top: 14px; right: 18px; }
  .type-question-box .card-difficulty { position: absolute; bottom: 14px; left: 18px; }
  .type-question-text {
    font-size: 17px;
    line-height: 1.55;
    color: #fff;
    font-weight: 500;
    max-width: 100%;
    word-wrap: break-word;
  }
  .type-input-row {
    display: flex;
    gap: 8px;
  }
  .type-input {
    flex: 1;
    min-height: 52px;
    padding: 14px 16px;
    border-radius: 14px;
    border: 2px solid #2a2a4a;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .type-input:focus { border-color: #4ecdc4; }
  .type-submit-btn {
    padding: 14px 24px;
    border-radius: 14px;
    border: none;
    background: #4ecdc4;
    color: #0f0f23;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .type-submit-btn:active { transform: scale(0.95); }

  /* Type result area */
  .type-result {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 4px 0;
  }
  .type-result-box {
    border-radius: 14px;
    padding: 16px;
    line-height: 1.55;
    font-size: 14px;
  }
  .type-result-yours {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #aaa;
  }
  .type-result-correct {
    background: rgba(78,205,196,0.08);
    border: 1px solid #2d5a2d;
    color: #c0e8c0;
  }
  .type-result-label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .type-match-score {
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    padding: 8px 0;
  }
  .term-matched { color: #4ecdc4; font-weight: 600; }
  .term-missed { color: #f59e0b; font-weight: 600; text-decoration: underline; text-decoration-style: dotted; }

  /* === SESSION SUMMARY === */
  .summary {
    text-align: center;
    padding: 40px 24px;
    max-width: 400px;
  }
  .summary h2 {
    font-size: 28px;
    margin-bottom: 4px;
    background: linear-gradient(to right, #4ecdc4, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .summary .score-big { font-size: 56px; font-weight: 800; color: #4ecdc4; margin: 16px 0; }
  .summary .score-label { color: #888; font-size: 13px; }
  .summary-stats { display: flex; gap: 24px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
  .summary-stat { text-align: center; }
  .summary-stat .num { font-size: 24px; font-weight: 700; }
  .summary-stat .label { font-size: 11px; color: #666; }
  .summary-msg { color: #888; font-size: 14px; margin: 16px 0; line-height: 1.5; }
  .restart-btn {
    margin-top: 12px;
    padding: 14px 40px;
    border-radius: 14px;
    border: none;
    background: #4ecdc4;
    color: #0f0f23;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  /* === KEYBOARD HINTS (desktop only) === */
  .kbd-hints { font-size: 10px; color: #444; text-align: center; padding: 4px 0 12px; }
  @media (pointer: coarse) { .kbd-hints { display: none; } }
  kbd { background: #1a1a2e; border: 1px solid #333; border-radius: 4px; padding: 2px 6px; font-family: monospace; font-size: 10px; }

  /* === MOBILE TWEAKS === */
  @media (max-width: 480px) {
    .header h1 { font-size: 18px; }
    .card-container { height: 260px; }
    .card-text { font-size: 15px; }
    .card-back .card-text { font-size: 14px; }
    .card-face { padding: 20px 16px; }
    .action-btn { padding: 16px 8px; font-size: 16px; }
    .quiz-question-text { font-size: 15px; }
    .type-question-text { font-size: 15px; }
  }

  @media (max-width: 360px) {
    .card-container { height: 240px; }
    .card-text { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>JS Interview Flashcards</h1>
</div>

<div class="mode-switcher">
  <button class="mode-btn active" onclick="setMode('classic')">Classic</button>
  <button class="mode-btn" onclick="setMode('quiz')">Quiz</button>
  <button class="mode-btn" onclick="setMode('type')">Type</button>
</div>

<div class="streak-bar">
  <span class="streak-fire" id="streak-icon">&#128293;</span>
  <span><span class="streak-num" id="streak-count">0</span> day streak</span>
  <span class="streak-label" id="streak-label"></span>
</div>

<div class="stats">
  <div class="stat know"><div class="num" id="know-count">0</div><div class="label">Know</div></div>
  <div class="stat learning"><div class="num" id="learning-count">0</div><div class="label">Learning</div></div>
  <div class="stat remaining"><div class="num" id="remaining-count">0</div><div class="label">New</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
<div class="filters" id="filters"></div>

<!-- CLASSIC MODE -->
<div class="card-wrapper" id="classic-area">
  <div class="card-container" id="card-container" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-topic" id="card-topic"></div>
        <div class="card-number" id="card-number"></div>
        <div class="card-text" id="card-front"></div>
        <div class="card-difficulty" id="card-diff"></div>
        <div class="card-hint">Tap to reveal</div>
      </div>
      <div class="card-face card-back">
        <div class="card-topic" id="card-topic-back"></div>
        <div class="card-number">Answer</div>
        <div class="card-text" id="card-back"></div>
      </div>
    </div>
  </div>
</div>

<div class="actions" id="actions" style="display:none;">
  <button class="action-btn btn-again" onclick="rate(0)">Again</button>
  <button class="action-btn btn-hard" onclick="rate(1)">Hard</button>
  <button class="action-btn btn-good" onclick="rate(2)">Good</button>
</div>

<!-- QUIZ MODE -->
<div class="quiz-area" id="quiz-area">
  <div class="quiz-question-box">
    <div class="card-topic" id="quiz-topic"></div>
    <div class="card-number" id="quiz-number"></div>
    <div class="quiz-question-text" id="quiz-question"></div>
    <div class="card-difficulty" id="quiz-diff"></div>
  </div>
  <div class="quiz-options" id="quiz-options"></div>
</div>

<!-- TYPE MODE -->
<div class="type-area" id="type-area">
  <div class="type-question-box">
    <div class="card-topic" id="type-topic"></div>
    <div class="card-number" id="type-number"></div>
    <div class="type-question-text" id="type-question"></div>
    <div class="card-difficulty" id="type-diff"></div>
  </div>
  <div class="type-input-row" id="type-input-row">
    <textarea class="type-input" id="type-input" rows="2" placeholder="Type your answer..."></textarea>
    <button class="type-submit-btn" onclick="submitTypeAnswer()">Submit</button>
  </div>
  <div class="type-result" id="type-result">
    <div class="type-match-score" id="type-match-score"></div>
    <div class="type-result-box type-result-yours">
      <div class="type-result-label">Your answer</div>
      <div id="type-yours-text"></div>
    </div>
    <div class="type-result-box type-result-correct">
      <div class="type-result-label">Correct answer</div>
      <div id="type-correct-text"></div>
    </div>
  </div>
  <div class="actions" id="type-actions" style="display:none;">
    <button class="action-btn btn-again" onclick="rate(0)">Again</button>
    <button class="action-btn btn-hard" onclick="rate(1)">Hard</button>
    <button class="action-btn btn-good" onclick="rate(2)">Good</button>
  </div>
</div>

<div class="kbd-hints" id="kbd-hints">
  <kbd>Space</kbd> flip &nbsp; <kbd>1</kbd> again &nbsp; <kbd>2</kbd> hard &nbsp; <kbd>3</kbd> good
</div>

<div class="toast" id="toast"></div>

<div class="summary" id="summary" style="display:none;">
  <h2>Session Done</h2>
  <div class="score-big" id="score-pct">0%</div>
  <div class="score-label" id="score-label">cards rated "Good"</div>
  <div class="summary-stats">
    <div class="summary-stat"><div class="num" id="s-reviewed">0</div><div class="label">Reviewed</div></div>
    <div class="summary-stat"><div class="num" style="color:#4ecdc4" id="s-good">0</div><div class="label">Good</div></div>
    <div class="summary-stat"><div class="num" style="color:#f59e0b" id="s-hard">0</div><div class="label">Hard</div></div>
    <div class="summary-stat"><div class="num" style="color:#dc2626" id="s-again">0</div><div class="label">Again</div></div>
  </div>
  <div class="summary-stats" id="quiz-accuracy-row" style="display:none;">
    <div class="summary-stat"><div class="num" style="color:#a855f7" id="s-quiz-acc">0%</div><div class="label">Quiz Accuracy</div></div>
  </div>
  <div class="summary-msg" id="s-msg"></div>
  <button class="restart-btn" onclick="resetSession()">Study Again</button>
  <br><br>
  <button class="restart-btn" onclick="studyWeakest()" style="background:#f59e0b;">Review Weak Cards</button>
</div>

<script>
// === DATA ===
let ALL_CARDS = [
  {
    "front": "What are the three ways to declare a variable in JavaScript, and which should you use?",
    "back": "let (block-scoped, reassignable), const (block-scoped, not reassignable), and var (function-scoped, legacy). Prefer const by default, use let when reassignment is needed, avoid var.",
    "topic": "Variables"
  },
  {
    "front": "What happens if you declare a variable with let twice in the same scope?",
    "back": "You get a SyntaxError. Repeated declarations of the same variable with let are not allowed in the same scope.",
    "topic": "Variables"
  },
  {
    "front": "What characters are allowed in JavaScript variable names?",
    "back": "Letters, digits, $ and _. The first character cannot be a digit. Names are case-sensitive. Reserved words (let, class, return, function) cannot be used.",
    "topic": "Variables"
  },
  {
    "front": "What happens if you assign to a variable without declaring it (no let/const/var) outside strict mode?",
    "back": "JavaScript silently creates a global variable. In strict mode ('use strict'), this throws a ReferenceError. This is a common source of bugs.",
    "topic": "Variables"
  },
  {
    "front": "When should you use UPPER_CASE constant names like COLOR_RED?",
    "back": "Only for hard-coded values known before execution (like hex color codes). Constants that are calculated at runtime (like page load time) should use normal camelCase.",
    "topic": "Variables"
  },
  {
    "front": "What are the 8 data types in JavaScript?",
    "back": "7 primitives: Number, BigInt, String, Boolean, null, undefined, Symbol. Plus 1 non-primitive: Object.",
    "topic": "Data Types"
  },
  {
    "front": "What does typeof null return, and why?",
    "back": "It returns \"object\". This is an officially recognized bug from early JavaScript that's kept for backward compatibility. null is its own type, not an object.",
    "topic": "Data Types"
  },
  {
    "front": "What does typeof function(){} return?",
    "back": "It returns \"function\". Even though functions are objects in JavaScript, typeof gives them special treatment and returns \"function\" instead of \"object\".",
    "topic": "Data Types"
  },
  {
    "front": "What is the difference between null and undefined?",
    "back": "undefined means a variable has been declared but not assigned a value (the default state). null is an explicitly assigned value meaning \"empty\" or \"unknown\".",
    "topic": "Data Types"
  },
  {
    "front": "What is BigInt and when would you use it?",
    "back": "BigInt represents integers of arbitrary length, created by appending n (e.g., 123n). Use it when numbers exceed the safe integer range of ±(2^53 - 1), such as for cryptography or microsecond timestamps.",
    "topic": "Data Types"
  },
  {
    "front": "What does Number(undefined) return vs Number(null)?",
    "back": "Number(undefined) returns NaN. Number(null) returns 0. This asymmetry is a common interview gotcha.",
    "topic": "Type Conversions"
  },
  {
    "front": "What does Number(\"\") return? What about Number(\"  \")?",
    "back": "Both return 0. When converting a string to a number, whitespace is stripped first, and an empty string converts to 0.",
    "topic": "Type Conversions"
  },
  {
    "front": "What are the falsy values in JavaScript?",
    "back": "0, \"\" (empty string), null, undefined, NaN, and false. Everything else is truthy — including \"0\", \" \", and empty arrays/objects.",
    "topic": "Type Conversions"
  },
  {
    "front": "Is Boolean(\"0\") true or false? Why?",
    "back": "It's true. \"0\" is a non-empty string, and all non-empty strings are truthy. Only the empty string \"\" is falsy.",
    "topic": "Type Conversions"
  },
  {
    "front": "What does Number(\"123z\") return?",
    "back": "NaN. Numeric conversion of a string fails if the string contains non-numeric characters (after trimming whitespace). It's all-or-nothing — unlike parseInt which would return 123.",
    "topic": "Type Conversions"
  },
  {
    "front": "What does '2' + 1 return? What about '6' - 2?",
    "back": "'2' + 1 returns \"21\" (string concatenation because + works with strings). '6' - 2 returns 4 (subtraction always converts to numbers). Only + has this string behavior.",
    "topic": "Operators"
  },
  {
    "front": "What does 2 + 2 + '1' evaluate to? What about '1' + 2 + 2?",
    "back": "2 + 2 + '1' = \"41\" (numeric add first, then string concat). '1' + 2 + 2 = \"122\" (once a string appears, everything after concatenates). Operators evaluate left to right.",
    "topic": "Operators"
  },
  {
    "front": "What does the unary + operator do to a non-number value?",
    "back": "It converts the value to a number, equivalent to Number(). For example: +true is 1, +\"\" is 0, +\"3\" is 3.",
    "topic": "Operators"
  },
  {
    "front": "What is the difference between ++x (prefix) and x++ (postfix)?",
    "back": "Both increment x by 1, but ++x returns the new value after incrementing, while x++ returns the old value before incrementing.",
    "topic": "Operators"
  },
  {
    "front": "What does the comma operator do? What does (1 + 2, 3 + 4) return?",
    "back": "The comma operator evaluates all expressions but returns only the last one. (1 + 2, 3 + 4) returns 7. It has very low precedence, so parentheses are usually needed.",
    "topic": "Operators"
  },
  {
    "front": "What is the difference between == and ===?",
    "back": "== (loose equality) converts operands to the same type before comparing, so 0 == false is true. === (strict equality) checks value AND type with no conversion, so 0 === false is false.",
    "topic": "Comparisons"
  },
  {
    "front": "What does null == undefined return? What about null === undefined?",
    "back": "null == undefined is true (special rule: they equal each other with ==). null === undefined is false (different types). null and undefined don't == anything else.",
    "topic": "Comparisons"
  },
  {
    "front": "Why is null >= 0 true, but null > 0 and null == 0 both false?",
    "back": "Comparisons (>=, >, <, <=) convert null to 0 via numeric conversion, so null >= 0 means 0 >= 0 (true) and null > 0 means 0 > 0 (false). But == has special rules where null only equals undefined, not 0.",
    "topic": "Comparisons"
  },
  {
    "front": "How does JavaScript compare strings like 'Bee' > 'Be'?",
    "back": "Strings are compared character by character using Unicode values (lexicographic order). If all characters match but one string is longer, the longer string is greater. So 'Bee' > 'Be' is true. Lowercase letters have higher Unicode values than uppercase.",
    "topic": "Comparisons"
  },
  {
    "front": "What happens when you compare undefined with a number using > or <?",
    "back": "undefined converts to NaN for numeric comparisons, and any comparison with NaN returns false. So undefined > 0, undefined < 0, and undefined == 0 are all false.",
    "topic": "Comparisons"
  },
  {
    "front": "What values are treated as falsy in an if() condition?",
    "back": "0, \"\" (empty string), null, undefined, NaN, and false. All other values are truthy, including \"0\", \" \" (space string), and empty objects/arrays.",
    "topic": "Conditional Branching"
  },
  {
    "front": "Can the ternary operator replace if/else? Should it?",
    "back": "Technically yes, and ternaries can be chained. But best practice is to use ternary only for choosing between two values (assignment), not for executing different code branches with side effects. Use if/else for that.",
    "topic": "Conditional Branching"
  },
  {
    "front": "What does the || (OR) operator actually return?",
    "back": "It returns the first truthy value (not converted to boolean), or the last value if all are falsy. Example: null || 0 || \"hello\" returns \"hello\". This is why || is used for default values.",
    "topic": "Logical Operators"
  },
  {
    "front": "What does the && (AND) operator actually return?",
    "back": "It returns the first falsy value (not converted to boolean), or the last value if all are truthy. Example: 1 && 2 && 3 returns 3. Example: 1 && null && 3 returns null.",
    "topic": "Logical Operators"
  },
  {
    "front": "What is short-circuit evaluation in || and &&?",
    "back": "|| stops at the first truthy value, && stops at the first falsy value. Remaining operands are not evaluated. This means side effects in skipped operands never execute: true || alert('hi') — the alert never runs.",
    "topic": "Logical Operators"
  },
  {
    "front": "Which has higher precedence: && or ||?",
    "back": "&& has higher precedence than ||. So a && b || c && d is evaluated as (a && b) || (c && d), not left to right.",
    "topic": "Logical Operators"
  },
  {
    "front": "What does the double NOT (!!) do?",
    "back": "It converts a value to its boolean equivalent. The first ! converts to boolean and inverts, the second ! inverts back. Equivalent to Boolean(value). Example: !!\"hello\" is true, !!0 is false.",
    "topic": "Logical Operators"
  },
  {
    "front": "What is the difference between || and ?? (nullish coalescing)?",
    "back": "|| returns the first truthy value (treats 0, \"\", false as falsy). ?? returns the first defined value (only treats null and undefined as nullish). Use ?? when 0 or \"\" are valid values you want to keep.",
    "topic": "Logical Operators"
  },
  {
    "front": "Can you use ?? together with || or && without parentheses?",
    "back": "No. JavaScript throws a SyntaxError if you mix ?? with || or && without explicit parentheses. You must write (a ?? b) || c or a ?? (b || c).",
    "topic": "Logical Operators"
  },
  {
    "front": "What is the key difference between while and do...while loops?",
    "back": "A while loop checks the condition before each iteration (may never execute). A do...while loop checks after each iteration, so the body always executes at least once.",
    "topic": "Loops"
  },
  {
    "front": "What is the scope of a variable declared with let inside a for loop?",
    "back": "It is scoped to the loop block only. for (let i = 0; ...) { } — i is not accessible outside the loop. If declared with var, it would be accessible outside.",
    "topic": "Loops"
  },
  {
    "front": "What are labels in JavaScript loops and how do they work?",
    "back": "Labels like outer: for(...) let you break or continue outer loops from inside nested loops. break outer jumps out of the labeled loop entirely. Labels only work with loops, not arbitrary code.",
    "topic": "Loops"
  },
  {
    "front": "Can you use break or continue inside a ternary operator?",
    "back": "No. break and continue are statements, not expressions. They must be inside a loop's code block and cannot be used with the ternary ? operator.",
    "topic": "Loops"
  },
  {
    "front": "What type of equality does the switch statement use?",
    "back": "switch uses strict equality (===). This means the string \"3\" will NOT match the number 3. Type matters — a common source of bugs when using prompt() which returns strings.",
    "topic": "Switch"
  },
  {
    "front": "What happens if you forget break in a switch case?",
    "back": "Execution falls through to the next case (and the next, and so on) without checking the case values. This continues until a break is hit or the switch ends.",
    "topic": "Switch"
  },
  {
    "front": "How do you make multiple switch cases run the same code?",
    "back": "Stack the cases without breaks between them: case 3: case 5: /* shared code */ break; This works because of fall-through behavior.",
    "topic": "Switch"
  },
  {
    "front": "Can switch and case values be expressions?",
    "back": "Yes. Both switch and case allow arbitrary expressions: switch(+a) and case b + 1 are valid. The expressions are evaluated and compared with ===.",
    "topic": "Switch"
  },
  {
    "front": "What does a function return if there is no return statement?",
    "back": "It returns undefined. An empty return statement (just return;) also returns undefined.",
    "topic": "Functions"
  },
  {
    "front": "Are function parameters passed by value or by reference in JavaScript?",
    "back": "Primitives are passed by value (a copy is made — changes inside the function don't affect the original). Objects are passed by reference to the same object in memory.",
    "topic": "Functions"
  },
  {
    "front": "What is variable shadowing in functions?",
    "back": "When a function declares a local variable with the same name as an outer variable, the local one takes precedence inside the function. The outer variable is unaffected.",
    "topic": "Functions"
  },
  {
    "front": "When are default parameter values evaluated in JavaScript?",
    "back": "Default parameters are evaluated every time the function is called without that argument, not once at definition time. So function f(arr = []) creates a new array on each call.",
    "topic": "Functions"
  },
  {
    "front": "What triggers a default parameter value: missing argument, or passing undefined?",
    "back": "Both. A default value is used when the parameter is undefined — either because the argument was omitted or explicitly passed as undefined. Passing null does NOT trigger the default.",
    "topic": "Functions"
  },
  {
    "front": "What is the difference between a function declaration and a function expression?",
    "back": "A declaration (function foo() {}) is hoisted and available before it's defined in code. An expression (let foo = function() {}) is only available after the assignment executes. Declarations are also block-scoped in strict mode.",
    "topic": "Functions"
  },
  {
    "front": "What is the syntax for an arrow function with a single parameter?",
    "back": "Parentheses are optional with one parameter: let double = n => n * 2; With zero or multiple parameters, parentheses are required: () => ... or (a, b) => ...",
    "topic": "Arrow Functions"
  },
  {
    "front": "When do you need an explicit return in an arrow function?",
    "back": "When using curly braces {} for a multiline body, you must write return explicitly. Without braces, a single expression is implicitly returned: n => n * 2 returns the result automatically.",
    "topic": "Arrow Functions"
  },
  {
    "front": "What does this arrow function return: let f = () => { 1 + 2 }?",
    "back": "undefined. The curly braces create a function body block, but there's no return statement. To return 1+2, either remove braces: () => 1 + 2, or add return: () => { return 1 + 2 }.",
    "topic": "Arrow Functions"
  },
  {
    "front": "What is the output: let x = 1; (function() { console.log(x); let x = 2; })()?",
    "back": "ReferenceError. The let declaration creates a 'temporal dead zone' — x exists in the function scope but cannot be accessed before its declaration, even though there's an outer x.",
    "topic": "Variables"
  },
  {
    "front": "What does typeof undefined return? What about typeof undeclaredVar?",
    "back": "Both return \"undefined\". typeof is special — it doesn't throw a ReferenceError for undeclared variables, making it safe for checking if a variable exists.",
    "topic": "Data Types"
  },
  {
    "front": "What does alert(1 && 2 && 3) show?",
    "back": "3. The && operator returns the first falsy value, or the last value if all are truthy. Since 1, 2, and 3 are all truthy, it returns the last value: 3.",
    "topic": "Logical Operators"
  },
  {
    "front": "What does alert(null || 2 && 3 || 4) show?",
    "back": "3. Since && has higher precedence, 2 && 3 evaluates first to 3. Then null || 3 || 4 evaluates: null is falsy, so 3 (truthy) is returned.",
    "topic": "Logical Operators"
  },
  {
    "front": "What are the two ways to access object properties, and when would you use each?",
    "back": "Dot notation (obj.prop) works with valid identifiers only. Bracket notation (obj[\"prop\"]) works with any string, multiword properties, and dynamic keys from variables.",
    "topic": "Objects"
  },
  {
    "front": "What are computed properties in an object literal?",
    "back": "Property names determined by expressions inside square brackets: `let bag = {[fruit]: 5}` where the variable `fruit` determines the actual property name at runtime.",
    "topic": "Objects"
  },
  {
    "front": "What is property value shorthand?",
    "back": "When a property name matches a variable name, you can write `{name, age}` instead of `{name: name, age: age}`.",
    "topic": "Objects"
  },
  {
    "front": "How does the 'in' operator differ from checking `=== undefined`?",
    "back": "The `in` operator returns true if a property exists even if its value is `undefined`. Checking `obj.prop === undefined` can't distinguish between a missing property and one explicitly set to undefined.",
    "topic": "Objects"
  },
  {
    "front": "How are object properties ordered when iterating with for..in?",
    "back": "Integer properties (like \"1\", \"2\", \"41\") are sorted numerically first. All other properties appear in creation order.",
    "topic": "Objects"
  },
  {
    "front": "What is the value of 'this' in a method call like obj.method()?",
    "back": "'this' refers to the object before the dot — so in obj.method(), 'this' is obj. It's evaluated at call-time, not definition-time.",
    "topic": "Object Methods"
  },
  {
    "front": "What is 'this' when a function is called without an object context?",
    "back": "In strict mode, 'this' is undefined. In non-strict (sloppy) mode, it defaults to the global object (window in browsers).",
    "topic": "Object Methods"
  },
  {
    "front": "How do arrow functions handle 'this' differently from regular functions?",
    "back": "Arrow functions have no own 'this'. They inherit 'this' from the enclosing lexical scope (the outer normal function).",
    "topic": "Object Methods"
  },
  {
    "front": "What happens to 'this' when you assign a method to a variable and call it?\n\nlet greet = obj.greet;\ngreet();",
    "back": "'this' is lost — it becomes undefined (strict mode) or the global object (non-strict). The method no longer has an object context because it's called as a standalone function.",
    "topic": "Object Methods"
  },
  {
    "front": "How do you enable method chaining on an object?",
    "back": "Return 'this' from each method, so callers can chain: obj.step1().step2().step3().",
    "topic": "Object Methods"
  },
  {
    "front": "What happens when you copy an object with `let b = a`?",
    "back": "Both variables point to the same object in memory (copy by reference). Modifying properties through either variable affects the shared object.",
    "topic": "Object Copying"
  },
  {
    "front": "What's the difference between shallow and deep cloning?",
    "back": "Shallow cloning copies top-level properties by value, but nested objects remain as shared references. Deep cloning recursively copies all nested structures into independent objects.",
    "topic": "Object Copying"
  },
  {
    "front": "How do Object.assign() and the spread operator clone objects?",
    "back": "Both perform shallow copies. `Object.assign({}, obj)` and `{...obj}` copy all top-level properties into a new object, but nested objects are still shared references.",
    "topic": "Object Copying"
  },
  {
    "front": "When should you use structuredClone() and what are its limitations?",
    "back": "Use structuredClone() for deep cloning nested objects — it handles circular references too. However, it fails on objects containing function properties.",
    "topic": "Object Copying"
  },
  {
    "front": "Can you modify properties of a const object?",
    "back": "Yes. 'const' prevents reassigning the variable itself, but properties of the referenced object are still mutable.",
    "topic": "Object Copying"
  },
  {
    "front": "What does the optional chaining operator ?. do?",
    "back": "It safely accesses nested properties — returns undefined instead of throwing an error when an intermediate value is null or undefined. E.g., user?.address?.street.",
    "topic": "Optional Chaining"
  },
  {
    "front": "How do you safely call a method that might not exist using optional chaining?",
    "back": "Use obj.method?.() — it calls the method only if it exists, otherwise returns undefined without throwing.",
    "topic": "Optional Chaining"
  },
  {
    "front": "What's the difference between obj?.prop and obj?.[prop]?",
    "back": "obj?.prop uses dot notation for static property names. obj?.[prop] uses bracket notation for dynamic/computed property access.",
    "topic": "Optional Chaining"
  },
  {
    "front": "Can you use optional chaining for writing/assignment?",
    "back": "No. `user?.name = 'value'` is an error. Optional chaining only works on the reading side, not the left side of an assignment.",
    "topic": "Optional Chaining"
  },
  {
    "front": "What does 'short-circuiting' mean in optional chaining?",
    "back": "When the left side of ?. is null/undefined, evaluation stops immediately — no further property access, method calls, or side effects execute.",
    "topic": "Optional Chaining"
  },
  {
    "front": "Why are push/pop faster than shift/unshift?",
    "back": "push/pop operate at the end of the array (no reindexing needed). shift/unshift operate at the beginning, requiring all remaining elements to be moved and reindexed.",
    "topic": "Arrays"
  },
  {
    "front": "Why should you use for..of instead of for..in for arrays?",
    "back": "for..in iterates over ALL properties (including non-numeric ones), is 10-100x slower for arrays, and is designed for generic objects. for..of iterates only over array values.",
    "topic": "Arrays"
  },
  {
    "front": "What's the gotcha with new Array(5)?",
    "back": "It creates an empty array with length 5, NOT an array containing the number 5. Use [5] or Array.of(5) instead.",
    "topic": "Arrays"
  },
  {
    "front": "What does arr.at(-1) do?",
    "back": "Returns the last element of the array. The at() method supports negative indexes, counting backwards from the end.",
    "topic": "Arrays"
  },
  {
    "front": "What happens when you set arr.length = 0?",
    "back": "It clears the array entirely. Decreasing length truncates the array irreversibly.",
    "topic": "Arrays"
  },
  {
    "front": "Can you compare arrays with ==?",
    "back": "No. Two arrays are only == if they reference the exact same object. [1,2] == [1,2] is false. Compare element-by-element instead.",
    "topic": "Arrays"
  },
  {
    "front": "What does [] + [] output? What about [] + 1?",
    "back": "[] converts to empty string \"\", so [] + [] is \"\". [] + 1 is \"1\". Arrays use toString() which returns comma-separated elements.",
    "topic": "Arrays"
  },
  {
    "front": "What's the difference between splice() and slice()?",
    "back": "splice() modifies the original array (add/remove elements) and returns removed items. slice() returns a new array copy of a portion without modifying the original.",
    "topic": "Array Methods"
  },
  {
    "front": "Why does [1, 2, 15].sort() produce [1, 15, 2]?",
    "back": "sort() converts elements to strings by default and sorts lexicographically. '15' < '2' as strings. Fix with a comparator: arr.sort((a, b) => a - b).",
    "topic": "Array Methods"
  },
  {
    "front": "Why use includes() over indexOf() for checking array membership?",
    "back": "includes() correctly handles NaN (returns true for NaN), while indexOf() uses strict equality (===) and cannot find NaN.",
    "topic": "Array Methods"
  },
  {
    "front": "What's the difference between find() and filter()?",
    "back": "find() returns the first matching element (or undefined). filter() returns an array of ALL matching elements.",
    "topic": "Array Methods"
  },
  {
    "front": "What happens if you call reduce() on an empty array without an initial value?",
    "back": "It throws a TypeError: 'Reduce of empty array with no initial value'. Always provide an initial value to be safe.",
    "topic": "Array Methods"
  },
  {
    "front": "How does Array.isArray() solve what typeof cannot?",
    "back": "typeof returns 'object' for both arrays and plain objects. Array.isArray([]) returns true, Array.isArray({}) returns false.",
    "topic": "Array Methods"
  },
  {
    "front": "What does forEach() return?",
    "back": "undefined. The return value of the callback is ignored. Use map() if you need a new array of transformed values.",
    "topic": "Array Methods"
  },
  {
    "front": "How does reduce() differ from map()?",
    "back": "map() transforms each element into a new array of the same length. reduce() accumulates all elements into a single value (number, string, object, etc.).",
    "topic": "Array Methods"
  },
  {
    "front": "What are the key differences between Map and a plain object?",
    "back": "Map allows any type as keys (objects, functions, etc.), preserves insertion order, has a .size property, and doesn't convert keys to strings. Objects only support string/symbol keys.",
    "topic": "Map and Set"
  },
  {
    "front": "Why can't you use objects as keys in a plain object, but you can in a Map?",
    "back": "Plain objects convert all keys to strings, so all object keys become '[object Object]'. Map preserves the actual object reference as the key.",
    "topic": "Map and Set"
  },
  {
    "front": "How do you convert between a plain object and a Map?",
    "back": "Object to Map: new Map(Object.entries(obj)). Map to Object: Object.fromEntries(map). Both use the entries format of [key, value] pairs.",
    "topic": "Map and Set"
  },
  {
    "front": "What is the primary purpose of a Set?",
    "back": "A Set stores unique values only — duplicate additions are silently ignored. It's optimized for fast membership testing with set.has(value).",
    "topic": "Map and Set"
  },
  {
    "front": "How does Map iteration order differ from plain objects?",
    "back": "Maps always iterate in insertion order. Plain objects sort integer keys numerically first, then other keys in creation order.",
    "topic": "Map and Set"
  },
  {
    "front": "Why does the Set forEach callback receive the value twice?\nset.forEach((value, valueAgain, set) => ...)",
    "back": "For compatibility with Map's forEach(value, key, map). Since Sets have no keys, the value is passed in place of the key argument.",
    "topic": "Map and Set"
  },
  {
    "front": "How do you skip elements during array destructuring?",
    "back": "Use commas without a variable name: let [first, , third] = [1, 2, 3] — skips the second element, third = 3.",
    "topic": "Destructuring"
  },
  {
    "front": "How does the rest operator work in destructuring?",
    "back": "It collects remaining elements into a new array: let [a, b, ...rest] = [1,2,3,4,5] gives rest = [3,4,5]. Must be the last element.",
    "topic": "Destructuring"
  },
  {
    "front": "How do you rename properties during object destructuring?",
    "back": "Use a colon — let {width: w, height: h} = options assigns the width property to variable w and height to h.",
    "topic": "Destructuring"
  },
  {
    "front": "How do default values work in destructuring?",
    "back": "Use = after the variable: let [name = 'Guest'] = []. Defaults activate only when the value is undefined (missing), not for null or other falsy values.",
    "topic": "Destructuring"
  },
  {
    "front": "Why do you need parentheses for object destructuring without let/const?\n\n{x, y} = obj; // Error!",
    "back": "JavaScript treats {…} as a code block. Wrap in parentheses to force expression context: ({x, y} = obj).",
    "topic": "Destructuring"
  },
  {
    "front": "How does destructuring improve function parameters?",
    "back": "Pass an object and destructure it: function show({title = 'Menu', width = 100} = {}). This gives named parameters with defaults and no argument-order dependency.",
    "topic": "Destructuring"
  },
  {
    "front": "Which property types does JSON.stringify skip automatically?",
    "back": "Functions (methods), Symbol keys/values, and properties with undefined values are all omitted from the JSON output.",
    "topic": "JSON"
  },
  {
    "front": "What is the replacer parameter in JSON.stringify?",
    "back": "The second argument — either an array of property names to include, or a function(key, value) that returns the value to encode (or undefined to skip it).",
    "topic": "JSON"
  },
  {
    "front": "What is the reviver parameter in JSON.parse?",
    "back": "An optional function(key, value) that can transform values during parsing — commonly used to convert date strings back into Date objects.",
    "topic": "JSON"
  },
  {
    "front": "How do you pretty-print JSON?",
    "back": "Pass a third argument to JSON.stringify: JSON.stringify(obj, null, 2) indents with 2 spaces. Can also pass a string for custom indentation.",
    "topic": "JSON"
  },
  {
    "front": "What is the toJSON() method?",
    "back": "A custom method you can define on an object. JSON.stringify automatically calls it instead of the default serialization, letting you control the JSON output.",
    "topic": "JSON"
  },
  {
    "front": "What happens when JSON.stringify encounters a circular reference?",
    "back": "It throws an error. JSON cannot represent circular structures. Use the replacer function to filter out circular references.",
    "topic": "JSON"
  },
  {
    "front": "What does JSON.parse('\"2024-01-01\"') return — a Date or a string?",
    "back": "A string. JSON has no Date type. Use a reviver function to convert: JSON.parse(str, (key, val) => key === 'date' ? new Date(val) : val).",
    "topic": "JSON"
  },
  {
    "front": "Why are Object.keys/values/entries static methods instead of instance methods like Map's?",
    "back": "Because objects may define their own keys() method. Using Object.keys(obj) avoids conflicts. Map uses map.keys() since Maps have a fixed interface.",
    "topic": "Object.keys/values/entries"
  },
  {
    "front": "Do Object.keys/values/entries return iterables or real arrays?",
    "back": "Real arrays (not iterables), unlike Map which returns iterables. This is for historical reasons and allows direct use of array methods like .map() and .filter().",
    "topic": "Object.keys/values/entries"
  },
  {
    "front": "How do you transform object values using Object.entries and Object.fromEntries?",
    "back": "Convert to entries array, transform with map, convert back: Object.fromEntries(Object.entries(obj).map(([k, v]) => [k, v * 2])).",
    "topic": "Object.keys/values/entries"
  },
  {
    "front": "Do Object.keys/values/entries include Symbol properties?",
    "back": "No, they skip symbolic properties. Use Object.getOwnPropertySymbols() or Reflect.ownKeys() to include symbols.",
    "topic": "Object.keys/values/entries"
  },
  {
    "front": "What is a closure in JavaScript?",
    "back": "A closure is a function that remembers and can access variables from its outer (lexical) scope, even after the outer function has returned. All JS functions are closures via the hidden [[Environment]] property.",
    "topic": "Closures"
  },
  {
    "front": "Do closures capture variable values or references?",
    "back": "Closures capture variable references, not snapshots of values. This means they always see the current value of the variable at the time they execute.",
    "topic": "Closures"
  },
  {
    "front": "What is a Lexical Environment?",
    "back": "An internal object consisting of an Environment Record (stores local variables) and a reference to the outer Lexical Environment. Every function, block, and script has one.",
    "topic": "Closures"
  },
  {
    "front": "What does this code output?\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0);\n}",
    "back": "It prints 3, 3, 3. The closure captures the reference to i (declared with var, so function-scoped). By the time the callbacks run, the loop has finished and i is 3. Using let instead fixes this because let creates a new binding per iteration.",
    "topic": "Closures"
  },
  {
    "front": "How do closures enable data privacy?",
    "back": "By returning functions that reference variables in the outer scope, those variables become inaccessible from outside. Only the returned functions can read/modify them, creating private state.",
    "topic": "Closures"
  },
  {
    "front": "When is a closure's Lexical Environment garbage collected?",
    "back": "Only when all nested functions referencing it become unreachable. As long as any closure references the outer scope, it stays in memory.",
    "topic": "Closures"
  },
  {
    "front": "How does variable lookup work in nested scopes?",
    "back": "JS searches the current Lexical Environment first, then walks up the chain of outer environments until the variable is found or the global scope is reached (throwing ReferenceError if not found).",
    "topic": "Closures"
  },
  {
    "front": "What is the [[Environment]] property on functions?",
    "back": "A hidden property set at function creation time that stores a reference to the Lexical Environment where the function was created. It never changes, even if the function is called elsewhere.",
    "topic": "Closures"
  },
  {
    "front": "Each call to an outer function creates a new Lexical Environment. True or false?",
    "back": "True. Each invocation creates a separate Lexical Environment, so closures from different calls have independent variable sets.",
    "topic": "Closures"
  },
  {
    "front": "What is the difference between rest parameters and the arguments object?",
    "back": "Rest parameters (...args) are a real Array with full array methods. The arguments object is array-like but lacks array methods, contains ALL arguments, and is not available in arrow functions.",
    "topic": "Rest Parameters & Spread"
  },
  {
    "front": "Where must rest parameters appear in a function signature?",
    "back": "Rest parameters must be the last parameter. They gather all remaining arguments into an array.",
    "topic": "Rest Parameters & Spread"
  },
  {
    "front": "What is the difference between rest and spread syntax?",
    "back": "Rest collects multiple elements into an array (used in function parameters/destructuring). Spread expands an iterable into individual elements (used in function calls/array/object literals). Both use ... syntax.",
    "topic": "Rest Parameters & Spread"
  },
  {
    "front": "Does spread syntax create a deep or shallow copy?",
    "back": "Shallow copy. [...arr] and {...obj} create new containers, but nested objects/arrays are still shared by reference.",
    "topic": "Rest Parameters & Spread"
  },
  {
    "front": "Do arrow functions have their own arguments object?",
    "back": "No. Arrow functions inherit arguments from the enclosing regular function. If there is no enclosing function, arguments is not available.",
    "topic": "Rest Parameters & Spread"
  },
  {
    "front": "Which is more universal: Array.from() or spread syntax for converting to arrays?",
    "back": "Array.from() works on both array-likes and iterables. Spread syntax only works with iterables. Use Array.from() for universal conversion.",
    "topic": "Rest Parameters & Spread"
  },
  {
    "front": "How can you merge two objects using spread?",
    "back": "const merged = {...obj1, ...obj2}. Properties from obj2 overwrite those in obj1 if keys conflict. This is equivalent to Object.assign({}, obj1, obj2).",
    "topic": "Rest Parameters & Spread"
  },
  {
    "front": "What is the most common mistake when passing a function to setTimeout?",
    "back": "Calling the function immediately instead of passing a reference: setTimeout(fn(), 1000) executes fn right away and passes its return value. Correct: setTimeout(fn, 1000).",
    "topic": "setTimeout & setInterval"
  },
  {
    "front": "What does setTimeout(fn, 0) actually do?",
    "back": "It schedules fn to run after the current script completes (not immediately). The browser enforces a minimum ~4ms delay after 5 nested timers. It yields to the event loop.",
    "topic": "setTimeout & setInterval"
  },
  {
    "front": "Why is nested setTimeout preferred over setInterval for repeated tasks?",
    "back": "Nested setTimeout guarantees a consistent delay between executions (delay starts after the previous call finishes). setInterval counts from the start of execution, so long-running callbacks can overlap or have no gap.",
    "topic": "setTimeout & setInterval"
  },
  {
    "front": "How do you cancel a setTimeout or setInterval?",
    "back": "Use clearTimeout(timerId) or clearInterval(timerId) with the ID returned from the scheduling call. The ID variable itself does not become null after cancellation.",
    "topic": "setTimeout & setInterval"
  },
  {
    "front": "Does setTimeout guarantee exact timing?",
    "back": "No. CPU load, background tabs, and battery-saver modes can delay execution to 300ms-1000ms or more. The delay is a minimum, not a guarantee.",
    "topic": "setTimeout & setInterval"
  },
  {
    "front": "What output does this produce?\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0);\n}\nconsole.log('done');",
    "back": "'done' prints first, then 3, 3, 3. setTimeout callbacks run after the current script completes. With var, all closures share the same i which is 3 after the loop.",
    "topic": "setTimeout & setInterval"
  },
  {
    "front": "Why does setTimeout prevent garbage collection of its callback?",
    "back": "The scheduler keeps an internal reference to the callback until it fires (or is cleared). If the callback has closures, the entire outer Lexical Environment stays in memory.",
    "topic": "setTimeout & setInterval"
  },
  {
    "front": "What does this output?\nconsole.log(1);\nsetTimeout(() => console.log(2), 0);\nPromise.resolve().then(() => console.log(3));\nconsole.log(4);",
    "back": "1, 4, 3, 2. Synchronous code runs first (1, 4), then microtasks like Promise.then (3), then macrotasks like setTimeout (2).",
    "topic": "Event Loop & Microtasks"
  },
  {
    "front": "Why does passing an object method to setTimeout lose this?",
    "back": "setTimeout receives just the function reference, detached from its object. When called, this defaults to window (browser) or undefined (strict mode), not the original object.",
    "topic": "Function Binding"
  },
  {
    "front": "What does Function.prototype.bind() return?",
    "back": "A new 'exotic' callable object that permanently fixes this to the provided context. The bound function transparently delegates calls to the original function with the fixed context.",
    "topic": "Function Binding"
  },
  {
    "front": "Can you rebind a function that was already bound with .bind()?",
    "back": "No. The context is hard-fixed at bind time. Calling .bind() again on a bound function will not override the original binding.",
    "topic": "Function Binding"
  },
  {
    "front": "How does bind() differ from call() and apply()?",
    "back": "bind() returns a new function without invoking it. call() and apply() invoke the function immediately. call() takes arguments individually; apply() takes them as an array.",
    "topic": "Function Binding"
  },
  {
    "front": "What is partial application with bind()?",
    "back": "Fixing some arguments of a function to create a specialized version: const double = multiply.bind(null, 2). Use null for context when this is not needed.",
    "topic": "Function Binding"
  },
  {
    "front": "Do bound functions retain properties of the original function?",
    "back": "No. A bound function is a new object and does not carry over custom properties from the original function.",
    "topic": "Function Binding"
  },
  {
    "front": "How do arrow functions handle this differently from bind()?",
    "back": "Arrow functions inherit this lexically from their enclosing scope at definition time. bind() explicitly sets this to a specific object. Arrow functions have no own this at all.",
    "topic": "Function Binding"
  },
  {
    "front": "How do you fix this for a method used as an event handler?",
    "back": "Use element.addEventListener('click', obj.method.bind(obj)) or use an arrow function wrapper: () => obj.method(). Both preserve the correct this context.",
    "topic": "Function Binding"
  },
  {
    "front": "What are the three states of a Promise?",
    "back": "Pending (initial, in progress), Fulfilled (resolved successfully via resolve()), and Rejected (failed via reject()). A promise can only transition once from pending; further resolve/reject calls are ignored.",
    "topic": "Promises"
  },
  {
    "front": "When does the executor function of a Promise run?",
    "back": "Immediately and synchronously when new Promise(executor) is called, not when handlers are attached.",
    "topic": "Promises"
  },
  {
    "front": "What happens if you call resolve() twice in a Promise executor?",
    "back": "Only the first call takes effect. All subsequent resolve() or reject() calls are silently ignored. A promise settles exactly once.",
    "topic": "Promises"
  },
  {
    "front": "What is the difference between .then(f1, f2) and .then(f1).catch(f2)?",
    "back": "With .then(f1).catch(f2), errors thrown inside f1 are caught by f2. With .then(f1, f2), errors in f1 are NOT caught by f2 because f2 only handles rejection of the original promise.",
    "topic": "Promises"
  },
  {
    "front": "What does .finally() do on a Promise?",
    "back": "Runs a handler regardless of outcome (no arguments received), then passes the result/error through to the next handler. Useful for cleanup. Returned values are ignored; thrown errors propagate.",
    "topic": "Promises"
  },
  {
    "front": "What happens if you attach .then() to an already-resolved Promise?",
    "back": "The handler still executes (asynchronously, as a microtask). Promises allow attaching handlers at any time, even after settlement.",
    "topic": "Promises"
  },
  {
    "front": "Why should you pass Error objects to reject() rather than strings?",
    "back": "Error objects include a stack trace, making debugging easier. Strings lose call stack information.",
    "topic": "Promises"
  },
  {
    "front": "How does Promise chaining work?",
    "back": "Each .then() returns a new Promise. The value returned from a .then() handler becomes the resolved value of that new Promise, allowing sequential .then() calls to process results step by step.",
    "topic": "Promise Chaining"
  },
  {
    "front": "What happens when a .then() handler returns a Promise?",
    "back": "The chain waits for that Promise to settle before proceeding. The next .then() receives the resolved value of the returned Promise.",
    "topic": "Promise Chaining"
  },
  {
    "front": "What is the common mistake with adding multiple .then() to the same promise?",
    "back": "Adding multiple .then() to one promise is NOT chaining -- they run independently with the same input. True chaining requires each .then() to be called on the result of the previous one.",
    "topic": "Promise Chaining"
  },
  {
    "front": "What is a thenable object?",
    "back": "Any object with a .then() method. JavaScript treats thenables like Promises in chains and with await, calling .then() with resolve/reject callbacks. This enables interop with third-party Promise implementations.",
    "topic": "Promise Chaining"
  },
  {
    "front": "How do errors propagate in a Promise chain?",
    "back": "An error (thrown or rejected) skips all .then() handlers and jumps to the nearest .catch(). After .catch() handles it, the chain can continue normally if .catch() returns a value.",
    "topic": "Promise Chaining"
  },
  {
    "front": "What does the async keyword do to a function?",
    "back": "It makes the function always return a Promise. Non-promise return values are automatically wrapped in Promise.resolve(). It also enables using await inside the function.",
    "topic": "Async/Await"
  },
  {
    "front": "What does await do?",
    "back": "It pauses async function execution until the Promise settles, then returns the resolved value. If the Promise rejects, it throws the error as an exception. It does NOT block the main thread.",
    "topic": "Async/Await"
  },
  {
    "front": "Where can you use await?",
    "back": "Inside async functions, and at the top level of ES modules (top-level await). Using await in a regular function causes a SyntaxError.",
    "topic": "Async/Await"
  },
  {
    "front": "How do you handle errors with async/await?",
    "back": "Wrap await calls in try/catch blocks. The catch block receives the rejection reason. Alternatively, append .catch() to the async function call.",
    "topic": "Async/Await"
  },
  {
    "front": "How do you run multiple async operations in parallel with await?",
    "back": "Use await Promise.all([promise1, promise2, ...]). This runs all promises concurrently and waits for all to complete. Sequential awaits would run them one after another.",
    "topic": "Async/Await"
  },
  {
    "front": "Does await only work with native Promises?",
    "back": "No. await works with any thenable (object with a .then() method). It calls .then() with resolve/reject to get the result.",
    "topic": "Async/Await"
  },
  {
    "front": "What happens with unhandled rejections in async functions?",
    "back": "If an async function's rejected promise has no .catch() and is not awaited in a try/catch, it becomes an unhandled promise rejection, triggering the 'unhandledrejection' event.",
    "topic": "Async/Await"
  },
  {
    "front": "Does try...catch work with asynchronous code like setTimeout?",
    "back": "No. try/catch only catches synchronous runtime errors. By the time a setTimeout callback executes, the try/catch block has already finished. For async errors, use try/catch inside the callback or use Promises.",
    "topic": "Error Handling"
  },
  {
    "front": "What are the three properties of an Error object?",
    "back": "name (error type, e.g. 'TypeError'), message (human-readable description), and stack (call stack trace, non-standard but widely supported).",
    "topic": "Error Handling"
  },
  {
    "front": "What is the rethrowing pattern in try/catch?",
    "back": "Catch only errors you know how to handle (check with instanceof or err.name), and rethrow everything else with throw err. This prevents swallowing unexpected errors.",
    "topic": "Error Handling"
  },
  {
    "front": "When does the finally block execute?",
    "back": "Always -- after try if no error, after catch if there was one. It runs before control returns to calling code, even if try/catch has a return statement.",
    "topic": "Error Handling"
  },
  {
    "front": "Can try/catch handle syntax (parse-time) errors?",
    "back": "No. try/catch only handles runtime errors in valid, parseable code. Syntax errors prevent the code from being parsed at all.",
    "topic": "Error Handling"
  },
  {
    "front": "What is window.onerror used for?",
    "back": "A global handler for uncaught errors that escape all try/catch blocks. Typically used to log errors to external services. It cannot recover from the error.",
    "topic": "Error Handling"
  },
  {
    "front": "Can you omit the error parameter in a catch block?",
    "back": "Yes. Modern JavaScript allows catch { ... } without (err) when you don't need error details.",
    "topic": "Error Handling"
  },
  {
    "front": "What is a JavaScript class under the hood?",
    "back": "A class is a function. class User {} creates a function named User from the constructor, and stores methods on User.prototype. typeof User === 'function'.",
    "topic": "Classes"
  },
  {
    "front": "What are the key differences between class syntax and function constructors?",
    "back": "Classes must be called with new (throws otherwise), methods are non-enumerable by default, class body is always in strict mode, and classes are not hoisted like function declarations.",
    "topic": "Classes"
  },
  {
    "front": "Where do class methods live vs class fields?",
    "back": "Methods are stored on the prototype (shared across instances). Class fields are set on each individual instance (not on prototype).",
    "topic": "Classes"
  },
  {
    "front": "How do class field arrow functions solve the this problem?",
    "back": "Declaring a method as a class field with arrow syntax (e.g., handleClick = () => {...}) creates a per-instance function that captures this from the constructor, so it works correctly as a callback.",
    "topic": "Classes"
  },
  {
    "front": "Can you create a class expression and assign it to a variable?",
    "back": "Yes. let User = class { ... }; is valid. Named class expressions (class MyClass { }) have the name accessible only inside the class body.",
    "topic": "Classes"
  },
  {
    "front": "What does the extends keyword do internally?",
    "back": "It sets Child.prototype.__proto__ = Parent.prototype, establishing the prototype chain so instances of Child can access Parent's methods.",
    "topic": "Class Inheritance"
  },
  {
    "front": "Why must a derived class constructor call super() before using this?",
    "back": "Derived constructors have [[ConstructorKind]]:\"derived\" which skips automatic object creation. The parent constructor must run first (via super()) to create the object. Accessing this before super() throws ReferenceError.",
    "topic": "Class Inheritance"
  },
  {
    "front": "If a derived class has no constructor, what happens?",
    "back": "An implicit constructor is generated: constructor(...args) { super(...args); }. It passes all arguments through to the parent constructor.",
    "topic": "Class Inheritance"
  },
  {
    "front": "What is [[HomeObject]] and why does it matter for super?",
    "back": "[[HomeObject]] is an internal property on methods that tracks which class/object defined them. It allows super to correctly resolve the parent prototype. Only methods defined with method syntax (not function properties) get [[HomeObject]].",
    "topic": "Class Inheritance"
  },
  {
    "front": "Does the parent constructor use the child's overridden class fields?",
    "back": "No. The parent constructor always uses its own field values because child class fields are initialized after super() returns. However, overridden methods ARE called from the parent constructor.",
    "topic": "Class Inheritance"
  },
  {
    "front": "Can you use an expression after extends?",
    "back": "Yes. extends accepts any expression that evaluates to a class/constructor, enabling patterns like class Foo extends mixin(Base) for dynamic inheritance.",
    "topic": "Class Inheritance"
  },
  {
    "front": "What is the difference between named and default exports?",
    "back": "Named exports require curly braces on import and enforce consistent naming. Default exports (one per file) are imported without braces and can be given any local name.",
    "topic": "Modules"
  },
  {
    "front": "What happens when a module is imported multiple times?",
    "back": "The module code executes only once (on first import). All subsequent imports receive the same module object. This means module-level state is shared across all importers.",
    "topic": "Modules"
  },
  {
    "front": "What does export * from './module' re-export?",
    "back": "It re-exports all named exports but deliberately excludes the default export. To also re-export the default, you must add: export {default} from './module'.",
    "topic": "Modules"
  },
  {
    "front": "Can you use import/export inside an if block or function?",
    "back": "No. import/export must be at the top level of a module. They are static declarations resolved at parse time, not runtime. Use dynamic import() for conditional loading.",
    "topic": "Modules"
  },
  {
    "front": "What are two key characteristics of ES modules?",
    "back": "Modules always run in strict mode and have their own scope (top-level variables are not global). Each module is evaluated only once.",
    "topic": "Modules"
  },
  {
    "front": "What does import './module' (with no bindings) do?",
    "back": "It runs the module's code for its side effects but does not import any values. Useful for modules that set up globals or register things.",
    "topic": "Modules"
  },
  {
    "front": "What is [[Prototype]] in JavaScript?",
    "back": "A hidden internal property on every object that references another object (or null). When a property is not found on an object, JavaScript follows [[Prototype]] to look it up on the prototype.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "How does prototypal property lookup work?",
    "back": "When reading a property, JS checks the object first. If not found, it follows the [[Prototype]] chain, checking each prototype until the property is found or the chain ends at null.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "Does writing a property use the prototype chain?",
    "back": "No. Write and delete operations work directly on the object, never on the prototype. Exception: setter properties defined on the prototype will be called.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "What is the difference between for...in and Object.keys() regarding prototypes?",
    "back": "for...in iterates over both own AND inherited enumerable properties. Object.keys() returns only the object's own enumerable properties, ignoring the prototype chain.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "What does hasOwnProperty() do?",
    "back": "Returns true only if the property exists directly on the object (not inherited from the prototype). Useful for filtering own properties in a for...in loop.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "What is the modern way to get/set an object's prototype?",
    "back": "Use Object.getPrototypeOf(obj) and Object.setPrototypeOf(obj, proto). The __proto__ accessor is a legacy approach. Setting prototype after creation is slow; prefer Object.create().",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "What does this refer to when calling an inherited method?",
    "back": "Always the object before the dot (the calling object), not the prototype where the method is defined. Methods are shared via prototype, but this reflects the actual caller.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "Can prototype chains be circular?",
    "back": "No. JavaScript throws an error if you try to create a circular prototype reference. The chain must terminate at null.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "What is the relationship between __proto__ and Function.prototype?",
    "back": "Function.prototype is the object that becomes __proto__ of instances created with new. Constructor.prototype === instance.__proto__. They are related but distinct properties.",
    "topic": "Prototypal Inheritance"
  },
  {
    "front": "What is TypeScript and how does it relate to JavaScript?",
    "back": "TypeScript is a statically-typed superset of JavaScript that compiles (transpiles) to plain JavaScript. All valid JavaScript is valid TypeScript, but TypeScript adds optional type annotations, interfaces, generics, and other features.",
    "topic": "TypeScript"
  },
  {
    "front": "What are the basic primitive types in TypeScript?",
    "back": "string, number, boolean, null, undefined, symbol, and bigint. TypeScript also has special types: any, unknown, never, and void.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'any' type in TypeScript?",
    "back": "The 'any' type disables all type checking for a value. It allows any operation on the value without compiler errors, effectively opting out of TypeScript's type system.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'unknown' type in TypeScript?",
    "back": "The 'unknown' type is the type-safe counterpart of 'any'. You can assign any value to 'unknown', but you cannot perform any operations on it without first narrowing it to a more specific type via type guards.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the difference between 'any' and 'unknown'?",
    "back": "'any' disables type checking entirely — you can do anything with it. 'unknown' requires you to narrow the type before using it, making it much safer. Prefer 'unknown' over 'any' when the type is truly not known.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'never' type in TypeScript?",
    "back": "The 'never' type represents values that never occur — e.g., a function that always throws or has an infinite loop. It is a subtype of every type but no type is a subtype of 'never' (except 'never' itself).",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'void' type in TypeScript?",
    "back": "'void' represents the absence of a return value. Functions that don't explicitly return anything have a return type of 'void'. Unlike 'never', the function does complete — it just doesn't return a value.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the difference between 'void' and 'never'?",
    "back": "'void' means a function returns but produces no value (returns undefined). 'never' means the function never returns at all — it either throws an error or runs forever.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a union type in TypeScript?",
    "back": "A union type allows a value to be one of several types, written with the pipe operator: string | number. The value can be any one of the listed types, and you must narrow it before using type-specific operations.",
    "topic": "TypeScript"
  },
  {
    "front": "What is an intersection type in TypeScript?",
    "back": "An intersection type combines multiple types into one using the & operator: Type A & Type B. The resulting type has all properties from both types. Used to compose object types together.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the difference between union (|) and intersection (&) types?",
    "back": "Union (A | B) means the value is A OR B. Intersection (A & B) means the value is A AND B — it must satisfy both types simultaneously. Unions narrow options; intersections combine them.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a TypeScript interface?",
    "back": "An interface defines the shape of an object by specifying its property names and types. Interfaces can be extended, implemented by classes, and are open for declaration merging.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a TypeScript type alias?",
    "back": "A type alias (declared with 'type') gives a name to any type — primitives, unions, intersections, tuples, objects, etc. Unlike interfaces, type aliases cannot be re-opened or merged.",
    "topic": "TypeScript"
  },
  {
    "front": "What are the key differences between 'interface' and 'type'?",
    "back": "Interfaces support declaration merging (multiple declarations are merged) and can be extended with 'extends'. Type aliases cannot be re-opened but can represent unions, intersections, tuples, and primitives. For object shapes, they are mostly interchangeable.",
    "topic": "TypeScript"
  },
  {
    "front": "When should you use 'interface' vs 'type'?",
    "back": "Use 'interface' for object shapes you might extend or implement, and for public APIs (declaration merging is useful for libraries). Use 'type' for unions, intersections, mapped types, tuples, or when you need features interfaces don't support.",
    "topic": "TypeScript"
  },
  {
    "front": "What is declaration merging in TypeScript?",
    "back": "Declaration merging is when multiple interface declarations with the same name are automatically combined into a single interface. This only works with interfaces, not type aliases. It's useful for extending third-party types.",
    "topic": "TypeScript"
  },
  {
    "front": "What are generics in TypeScript?",
    "back": "Generics are type variables that allow you to create reusable components that work with multiple types while maintaining type safety. They let you parameterize types, e.g., function identity<T>(arg: T): T returns the same type it receives.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a generic constraint in TypeScript?",
    "back": "A generic constraint limits what types a type parameter can accept using the 'extends' keyword. For example, <T extends { length: number }> ensures T must have a length property.",
    "topic": "TypeScript"
  },
  {
    "front": "What does <T extends keyof U> mean?",
    "back": "It constrains the generic type T to be one of the keys of type U. This is commonly used in functions like Pick or property accessor functions to ensure the key actually exists on the object type.",
    "topic": "TypeScript"
  },
  {
    "front": "What are enums in TypeScript?",
