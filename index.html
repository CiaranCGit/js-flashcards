    "back": "Enums define a set of named constants. Numeric enums auto-increment from 0 (or a custom start), and string enums require explicit string values for each member. They exist at runtime as real objects.",
    "topic": "TypeScript"
  },
  {
    "front": "What are the gotchas with numeric enums in TypeScript?",
    "back": "Numeric enums allow reverse mapping (value to name), which can cause unexpected behavior. They also allow assigning any number to an enum-typed variable. Prefer string enums or 'as const' objects for safer alternatives.",
    "topic": "TypeScript"
  },
  {
    "front": "What is 'const enum' and how does it differ from a regular enum?",
    "back": "'const enum' is fully inlined at compile time — no runtime object is generated. This improves performance and bundle size, but you lose reverse mapping and cannot iterate over members at runtime.",
    "topic": "TypeScript"
  },
  {
    "front": "Why might you prefer 'as const' objects over enums?",
    "back": "'as const' objects are plain JavaScript (no runtime overhead from enum compilation), they preserve literal types, work well with tree-shaking, and avoid the numeric enum reverse-mapping gotcha. They're often considered more idiomatic.",
    "topic": "TypeScript"
  },
  {
    "front": "What is type narrowing in TypeScript?",
    "back": "Type narrowing is the process of refining a broad type to a more specific one within a code block. TypeScript's control flow analysis narrows types after checks like typeof, instanceof, equality checks, and custom type guards.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a type guard in TypeScript?",
    "back": "A type guard is an expression that performs a runtime check and narrows the type within the truthy branch. Built-in guards include typeof, instanceof, and 'in'. Custom type guards use the 'is' keyword: function isString(x: unknown): x is string.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a type predicate in TypeScript?",
    "back": "A type predicate is a return type annotation of the form 'paramName is Type' used in custom type guard functions. When the function returns true, TypeScript narrows the parameter to that type in the calling scope.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a discriminated union (tagged union)?",
    "back": "A discriminated union is a union type where each member has a common literal property (the discriminant) that TypeScript can use to narrow the type. Example: { kind: 'circle'; radius: number } | { kind: 'square'; side: number }.",
    "topic": "TypeScript"
  },
  {
    "front": "How do you use a discriminated union to narrow types?",
    "back": "Check the discriminant property with if/switch statements. TypeScript uses control flow analysis to narrow to the specific variant: switch(shape.kind) { case 'circle': /* shape is Circle here */ }.",
    "topic": "TypeScript"
  },
  {
    "front": "What does the 'keyof' operator do in TypeScript?",
    "back": "'keyof' takes an object type and produces a string or numeric literal union of its keys. For example, keyof { name: string; age: number } yields 'name' | 'age'.",
    "topic": "TypeScript"
  },
  {
    "front": "What does 'typeof' do in a type context in TypeScript?",
    "back": "In a type position, 'typeof' extracts the TypeScript type of a JavaScript value or variable. For example, const obj = { x: 1 }; type T = typeof obj; gives { x: number }. This is different from the runtime typeof operator.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a mapped type in TypeScript?",
    "back": "A mapped type creates a new type by iterating over the keys of another type using the syntax { [K in keyof T]: NewType }. Utility types like Partial, Required, and Readonly are implemented as mapped types.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a conditional type in TypeScript?",
    "back": "A conditional type selects one of two types based on a condition: T extends U ? X : Y. If T is assignable to U, the type is X; otherwise Y. They enable powerful type-level logic and are used heavily in utility types.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Partial<T> do?",
    "back": "Partial<T> makes all properties of T optional. It constructs a type with all properties of T set to optional (?). Useful for update/patch operations where you may only provide some fields.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Required<T> do?",
    "back": "Required<T> makes all properties of T required (removes optional modifiers). It is the opposite of Partial<T>.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Readonly<T> do?",
    "back": "Readonly<T> makes all properties of T readonly, preventing reassignment after creation. Note: it is shallow — nested objects are not deeply frozen.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Pick<T, K> do?",
    "back": "Pick<T, K> creates a type by selecting a set of properties K (a union of string literals) from T. Example: Pick<User, 'name' | 'email'> creates a type with only name and email.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Omit<T, K> do?",
    "back": "Omit<T, K> creates a type by removing the specified properties K from T. It is the inverse of Pick. Example: Omit<User, 'password'> creates a User type without the password field.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Record<K, T> do?",
    "back": "Record<K, T> constructs an object type whose property keys are K and values are T. Example: Record<string, number> is an object with string keys and number values. Useful for dictionaries and lookup maps.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Exclude<T, U> do?",
    "back": "Exclude<T, U> removes from union type T all members that are assignable to U. Example: Exclude<'a' | 'b' | 'c', 'a'> yields 'b' | 'c'.",
    "topic": "TypeScript"
  },
  {
    "front": "What does Extract<T, U> do?",
    "back": "Extract<T, U> extracts from union type T all members that are assignable to U. It is the opposite of Exclude. Example: Extract<string | number | boolean, string> yields string.",
    "topic": "TypeScript"
  },
  {
    "front": "What does NonNullable<T> do?",
    "back": "NonNullable<T> removes null and undefined from the type T. Example: NonNullable<string | null | undefined> yields string.",
    "topic": "TypeScript"
  },
  {
    "front": "What does ReturnType<T> do?",
    "back": "ReturnType<T> extracts the return type of a function type T. Example: ReturnType<() => string> yields string. The argument must be a function type.",
    "topic": "TypeScript"
  },
  {
    "front": "What is a type assertion in TypeScript?",
    "back": "A type assertion tells TypeScript to treat a value as a specific type using 'value as Type' or '<Type>value' syntax. It does NOT perform runtime conversion — it only affects the compiler. Use with caution as it bypasses type checking.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the difference between type assertion and type casting?",
    "back": "TypeScript has type assertions (compile-time only, no runtime effect) not type casting. Type assertions tell the compiler to treat a value as a type. Unlike casting in other languages, no runtime conversion happens — the emitted JavaScript is unchanged.",
    "topic": "TypeScript"
  },
  {
    "front": "What are function overloads in TypeScript?",
    "back": "Function overloads let you define multiple function signatures for different parameter/return type combinations, followed by one implementation signature. TypeScript resolves which overload matches at the call site for precise typing.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'infer' keyword in TypeScript?",
    "back": "The 'infer' keyword is used within conditional types to declare a type variable that TypeScript infers from context. Example: type ReturnType<T> = T extends (...args: any[]) => infer R ? R : never; infers the return type R.",
    "topic": "TypeScript"
  },
  {
    "front": "What is structural typing (duck typing) in TypeScript?",
    "back": "TypeScript uses structural typing: two types are compatible if their structures match (same properties and types), regardless of their names. If an object has all required properties of an interface, it satisfies that interface.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the difference between structural and nominal typing?",
    "back": "Structural typing (TypeScript) checks type compatibility by shape/structure. Nominal typing (Java, C#) checks by explicit name/declaration. In TypeScript, { name: string } is assignable to any interface requiring a name: string property.",
    "topic": "TypeScript"
  },
  {
    "front": "What is type inference in TypeScript?",
    "back": "Type inference is TypeScript's ability to automatically determine types without explicit annotations. TypeScript infers types from initialization values, return statements, and contextual typing (e.g., callback parameters).",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'as const' assertion?",
    "back": "'as const' makes a value deeply readonly and narrows all literal types to their exact values instead of widening them. For example, const x = [1, 2] as const gives type readonly [1, 2] instead of number[].",
    "topic": "TypeScript"
  },
  {
    "front": "What are tuple types in TypeScript?",
    "back": "A tuple is a fixed-length array where each element has a specific type. Example: [string, number] is a two-element tuple. Unlike arrays, tuples enforce both the number and types of elements at each position.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'satisfies' operator in TypeScript?",
    "back": "The 'satisfies' operator (TS 4.9+) validates that a value matches a type without widening or changing the inferred type. It gives you type checking AND preserves the narrow literal types, unlike 'as' which overrides inference.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the difference between 'implements' and 'extends' in TypeScript?",
    "back": "'extends' creates a subclass that inherits implementation from a parent class. 'implements' declares that a class must satisfy an interface's contract without inheriting any implementation — the class must provide its own.",
    "topic": "TypeScript"
  },
  {
    "front": "What are TypeScript decorators?",
    "back": "Decorators are special declarations (prefixed with @) that can be attached to classes, methods, properties, or parameters to modify their behavior. They are a stage 3 ECMAScript proposal and require experimentalDecorators or the TC39 decorator syntax in TS 5.0+.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the 'in' operator used for in TypeScript type narrowing?",
    "back": "The 'in' operator checks if a property exists on an object and narrows the type accordingly. Example: if ('swim' in animal) narrows animal to a type that has a 'swim' property.",
    "topic": "TypeScript"
  },
  {
    "front": "What is an index signature in TypeScript?",
    "back": "An index signature declares the types for keys and values when you don't know all property names ahead of time: { [key: string]: number }. It allows an object to have any number of string-keyed properties with number values.",
    "topic": "TypeScript"
  },
  {
    "front": "What is the difference between 'declare' keyword and regular declarations?",
    "back": "'declare' tells TypeScript that a variable, function, or class exists (defined elsewhere) without emitting any JavaScript. It's used for ambient declarations, like typing global variables or third-party libraries without type definitions.",
    "topic": "TypeScript"
  },
  {
    "front": "What are .d.ts files?",
    "back": "Declaration files (.d.ts) contain only type information with no implementation. They describe the shape of existing JavaScript libraries so TypeScript can type-check code using those libraries. They emit no JavaScript.",
    "topic": "TypeScript"
  },
  {
    "front": "What is strict mode in TypeScript (strict: true)?",
    "back": "Setting strict: true in tsconfig enables all strict type-checking options at once, including strictNullChecks, noImplicitAny, strictFunctionTypes, and others. It catches more bugs but requires more explicit typing.",
    "topic": "TypeScript"
  },
  {
    "front": "What does 'strictNullChecks' do?",
    "back": "When enabled, null and undefined are not assignable to other types unless explicitly included in the type (e.g., string | null). This prevents common null reference errors by forcing you to handle nullable values.",
    "topic": "TypeScript"
  },
  {
    "front": "What is JSX?",
    "back": "JSX is a syntax extension for JavaScript that lets you write HTML-like markup inside JS files. It gets compiled by Babel/SWC into React.createElement() calls (or the new JSX transform) that produce plain JavaScript objects describing the UI.",
    "topic": "React"
  },
  {
    "front": "Why can't browsers read JSX directly?",
    "back": "Browsers only understand standard JavaScript. JSX must be transpiled by a tool like Babel or SWC into regular React.createElement() function calls before it can run in the browser.",
    "topic": "React"
  },
  {
    "front": "Why must JSX expressions have a single parent element?",
    "back": "JSX compiles to React.createElement() calls, and a function can only return one value. Use a wrapper <div> or a React Fragment (<>...</>) to group multiple sibling elements.",
    "topic": "React"
  },
  {
    "front": "What is the difference between a functional component and a class component?",
    "back": "A functional component is a plain JavaScript function that accepts props and returns JSX. A class component extends React.Component and uses a render() method. Functional components are simpler, support hooks, and are the modern standard.",
    "topic": "React"
  },
  {
    "front": "Why did functional components win over class components?",
    "back": "Functional components are simpler to read and test, hooks allow full state and lifecycle management without classes, they avoid the confusion of 'this' binding, and they compose logic better through custom hooks rather than HOCs or render props.",
    "topic": "React"
  },
  {
    "front": "What is the difference between props and state?",
    "back": "Props are read-only data passed from parent to child (like function arguments). State is mutable data managed within a component that triggers re-renders when updated. Props flow down; state is local.",
    "topic": "React"
  },
  {
    "front": "Can you modify props inside a component?",
    "back": "No. Props are immutable within the receiving component. If a child needs to change data, the parent should pass down a callback function that the child calls to request the change.",
    "topic": "React"
  },
  {
    "front": "How does useState work?",
    "back": "useState(initialValue) returns an array of [currentState, setterFunction]. The setter triggers a re-render with the new value. The initial value is only used on the first render.",
    "topic": "React"
  },
  {
    "front": "Why should you use the functional form of setState (e.g., setCount(prev => prev + 1))?",
    "back": "Because React batches state updates, the current state value may be stale during the update. The functional form receives the most recent state as its argument, ensuring correct updates when the new state depends on the previous state.",
    "topic": "React"
  },
  {
    "front": "What is state batching in React?",
    "back": "React batches multiple setState calls within the same event handler (and since React 18, inside promises, timeouts, and native events too) into a single re-render for performance. This means state values won't update between consecutive set calls.",
    "topic": "React"
  },
  {
    "front": "What happens if you call useState with an object and only update one property?",
    "back": "useState does not merge objects like class setState does. You must spread the previous state manually: setState(prev => ({...prev, name: 'new'})). Otherwise, the other properties are lost.",
    "topic": "React"
  },
  {
    "front": "Can you call useState conditionally or inside a loop?",
    "back": "No. Hooks must be called at the top level of a component in the same order every render. Calling them conditionally or in loops breaks React's internal tracking of hook state by index.",
    "topic": "React"
  },
  {
    "front": "What does useEffect do?",
    "back": "useEffect lets you perform side effects (data fetching, subscriptions, DOM manipulation) in functional components. It runs after the component renders, not during.",
    "topic": "React"
  },
  {
    "front": "What does the dependency array in useEffect control?",
    "back": "It determines when the effect re-runs. An empty array [] means run once on mount. Listing specific values means re-run only when those values change. Omitting the array entirely means re-run after every render.",
    "topic": "React"
  },
  {
    "front": "What is the useEffect cleanup function and when does it run?",
    "back": "The function returned from useEffect runs before the effect re-executes and when the component unmounts. It's used to cancel subscriptions, clear timers, or remove event listeners to prevent memory leaks.",
    "topic": "React"
  },
  {
    "front": "How do you create an infinite re-render loop with useEffect?",
    "back": "By updating state inside useEffect without a dependency array, or by including a value in the dependency array that the effect itself changes. For example: useEffect(() => { setCount(count + 1) }) re-renders forever.",
    "topic": "React"
  },
  {
    "front": "What is the stale closure problem in useEffect?",
    "back": "When an effect captures a variable from render scope but only runs once (empty deps), it 'closes over' the initial value and never sees updates. Fix by adding the variable to the dependency array or using a ref.",
    "topic": "React"
  },
  {
    "front": "Why shouldn't you make the useEffect callback itself async?",
    "back": "useEffect expects its callback to return either nothing or a cleanup function. An async function returns a Promise, which React can't use as a cleanup. Instead, define an async function inside the effect and call it.",
    "topic": "React"
  },
  {
    "front": "What does useRef do?",
    "back": "useRef(initialValue) returns a mutable object { current: initialValue } that persists across renders. Changing .current does NOT trigger a re-render, unlike state.",
    "topic": "React"
  },
  {
    "front": "What are the two main use cases for useRef?",
    "back": "1) Accessing DOM elements directly (e.g., focusing an input via ref.current.focus()). 2) Storing mutable values that persist across renders without causing re-renders (e.g., previous values, timer IDs, instance variables).",
    "topic": "React"
  },
  {
    "front": "How does useRef differ from useState for storing values?",
    "back": "Both persist values across renders, but updating useState triggers a re-render while updating useRef.current does not. Use state for values that affect the UI; use refs for values that don't.",
    "topic": "React"
  },
  {
    "front": "What does useMemo do?",
    "back": "useMemo(computeFn, deps) caches the result of an expensive computation and only recalculates when one of the dependencies changes. It returns the memoized value, not a function.",
    "topic": "React"
  },
  {
    "front": "What does useCallback do?",
    "back": "useCallback(fn, deps) returns a memoized version of the callback function that only changes if a dependency changes. It's essentially useMemo(() => fn, deps). Useful for preventing unnecessary re-renders of child components that receive the callback as a prop.",
    "topic": "React"
  },
  {
    "front": "When should you NOT use useMemo or useCallback?",
    "back": "Don't use them for cheap computations or primitive props -- the overhead of memoization itself can be worse. They add complexity and are only beneficial when preventing genuinely expensive recalculations or unnecessary child re-renders verified by profiling.",
    "topic": "React"
  },
  {
    "front": "What is React Compiler (React Forget) and how does it relate to useMemo/useCallback?",
    "back": "React Compiler automatically memoizes components and hooks at compile time, removing the need to manually write useMemo, useCallback, and React.memo in many cases. It analyzes your code and inserts memoization where beneficial.",
    "topic": "React"
  },
  {
    "front": "When does a React component re-render?",
    "back": "A component re-renders when: 1) its state changes via setState, 2) its parent re-renders (passing new props or not), or 3) the context it consumes changes. Props changing alone doesn't cause re-render -- the parent re-rendering does.",
    "topic": "React"
  },
  {
    "front": "Why are keys important in React lists?",
    "back": "Keys help React identify which items changed, were added, or removed in a list. Without stable, unique keys, React can't efficiently reconcile the old and new virtual DOM trees and may incorrectly reuse or destroy component state.",
    "topic": "React"
  },
  {
    "front": "Why is using array index as a key problematic?",
    "back": "If items are reordered, inserted, or deleted, the indices shift and React will associate the wrong state with the wrong elements. This causes bugs like input values appearing in the wrong row. Use a stable unique ID instead.",
    "topic": "React"
  },
  {
    "front": "What is 'lifting state up'?",
    "back": "Moving shared state to the closest common ancestor of the components that need it. The parent holds the state and passes it down via props, ensuring a single source of truth when multiple children need to stay in sync.",
    "topic": "React"
  },
  {
    "front": "What is the Context API and what problem does it solve?",
    "back": "Context provides a way to pass data through the component tree without manually threading props at every level (prop drilling). You create a context, provide a value at a higher level, and consume it in any descendant with useContext.",
    "topic": "React"
  },
  {
    "front": "When should you use Context API vs prop drilling?",
    "back": "Use Context for truly global data (theme, auth, locale) needed by many components at different nesting levels. For data needed by just a few closely related components, prop drilling is simpler and makes data flow more explicit.",
    "topic": "React"
  },
  {
    "front": "What is a downside of using Context for frequently changing state?",
    "back": "Every component consuming a context re-renders whenever the context value changes, even if they only use a small part of it. For frequently changing state (like form inputs), this can cause performance issues. Consider state management libraries or splitting contexts.",
    "topic": "React"
  },
  {
    "front": "What is a custom hook?",
    "back": "A JavaScript function whose name starts with 'use' that can call other hooks. Custom hooks let you extract and reuse stateful logic between components without changing the component hierarchy. Each call to a custom hook gets its own isolated state.",
    "topic": "React"
  },
  {
    "front": "Give an example of when you'd build a custom hook.",
    "back": "A useFetch(url) hook that encapsulates data fetching with loading/error states, or a useLocalStorage(key) hook that syncs state with localStorage. Any time two components share the same stateful logic pattern, extract it into a custom hook.",
    "topic": "React"
  },
  {
    "front": "What is a controlled component?",
    "back": "A form element whose value is driven by React state. The component renders the current state value and uses an onChange handler to update state. React is the single source of truth for the input's value.",
    "topic": "React"
  },
  {
    "front": "What is an uncontrolled component?",
    "back": "A form element that manages its own internal state via the DOM. You access its value using a ref (useRef) rather than controlling it through React state. Useful for simple forms or integrating with non-React code.",
    "topic": "React"
  },
  {
    "front": "When would you choose an uncontrolled component over a controlled one?",
    "back": "For file inputs (which are always uncontrolled), quick prototypes, or integrating with third-party DOM libraries. In most cases, controlled components are preferred because they give you full control over form data and enable instant validation.",
    "topic": "React"
  },
  {
    "front": "What does React.memo do?",
    "back": "React.memo is a higher-order component that memoizes a functional component, skipping re-render if its props haven't changed (shallow comparison). It's a performance optimization for components that render the same output given the same props.",
    "topic": "React"
  },
  {
    "front": "When is React.memo NOT helpful?",
    "back": "When props change on almost every render (e.g., inline objects/functions created in the parent), when the component is cheap to render, or when you pass children as props (children are a new object each render). It adds overhead without benefit in these cases.",
    "topic": "React"
  },
  {
    "front": "What is React.lazy and how does it work with Suspense?",
    "back": "React.lazy() lets you dynamically import a component so it's only loaded when first rendered. Wrap it in <Suspense fallback={<Loading/>}> to show a fallback UI while the component code is being fetched.",
    "topic": "React"
  },
  {
    "front": "What is Suspense in React?",
    "back": "Suspense is a component that lets you declaratively specify a loading UI (fallback) while waiting for asynchronous operations like lazy-loaded components or data fetching to complete.",
    "topic": "React"
  },
  {
    "front": "How does event handling in React differ from vanilla JavaScript?",
    "back": "React uses camelCase event names (onClick vs onclick), passes a SyntheticEvent wrapper (not the native event), uses event delegation at the root rather than individual DOM nodes, and you pass functions as handlers rather than strings.",
    "topic": "React"
  },
  {
    "front": "What is a SyntheticEvent in React?",
    "back": "A cross-browser wrapper around the native browser event that normalizes event behavior across different browsers. It has the same interface as native events. Access the native event via event.nativeEvent if needed.",
    "topic": "React"
  },
  {
    "front": "What is the Virtual DOM?",
    "back": "A lightweight JavaScript representation of the real DOM that React keeps in memory. When state changes, React creates a new virtual DOM tree, diffs it against the previous one (reconciliation), and applies only the minimal set of real DOM changes needed.",
    "topic": "React"
  },
  {
    "front": "What is reconciliation in React?",
    "back": "The algorithm React uses to diff two virtual DOM trees and determine the minimum number of operations to update the real DOM. It uses element type and keys to decide whether to update, replace, or remove elements.",
    "topic": "React"
  },
  {
    "front": "What is React Fiber?",
    "back": "React's reimplemented core reconciliation algorithm (introduced in React 16) that enables incremental rendering -- splitting rendering work into chunks and spreading it across multiple frames so the UI stays responsive during complex updates.",
    "topic": "React"
  },
  {
    "front": "What is the difference between useLayoutEffect and useEffect?",
    "back": "useLayoutEffect fires synchronously after DOM mutations but before the browser paints, so it can read layout and block visual updates. useEffect fires asynchronously after paint. Use useLayoutEffect only when you need to measure or mutate the DOM before the user sees it.",
    "topic": "React"
  },
  {
    "front": "What is useReducer and when would you use it over useState?",
    "back": "useReducer(reducer, initialState) manages state with a reducer function, similar to Redux. Use it when state logic is complex, involves multiple sub-values, or when the next state depends on the previous one in non-trivial ways.",
    "topic": "React"
  },
  {
    "front": "What is useTransition and what problem does it solve?",
    "back": "useTransition lets you mark state updates as non-urgent (transitions), so React can keep the UI responsive by prioritizing urgent updates (like typing) over expensive re-renders (like filtering a large list).",
    "topic": "React"
  },
  {
    "front": "What is prop drilling and why is it a problem?",
    "back": "Passing props through multiple intermediate components that don't use them, just to reach a deeply nested child. It makes code harder to maintain, creates tight coupling, and clutters components with irrelevant props.",
    "topic": "React"
  },
  {
    "front": "What is the children prop in React?",
    "back": "A special prop that contains the content between a component's opening and closing tags. It enables composition by letting parent components pass arbitrary JSX to be rendered inside a child component.",
    "topic": "React"
  },
  {
    "front": "What is a React Fragment and why use it?",
    "back": "A Fragment (<React.Fragment> or <>) lets you group multiple elements without adding an extra DOM node. Useful when a component needs to return sibling elements but you don't want a wrapper div affecting layout or semantics.",
    "topic": "React"
  },
  {
    "front": "What are React Server Components?",
    "back": "Components that render exclusively on the server and send only their output (not their JavaScript) to the client. They can directly access databases and file systems, reduce client bundle size, and are marked by the absence of 'use client' directive.",
    "topic": "React"
  },
  {
    "front": "What is the difference between 'use client' and 'use server' directives?",
    "back": "'use client' marks a component (and its imports) to run on the client with interactivity. 'use server' marks a function as a server action callable from client components. By default in frameworks like Next.js App Router, components are server components.",
    "topic": "React"
  },
  {
    "front": "What is a Higher-Order Component (HOC)?",
    "back": "A function that takes a component and returns a new enhanced component with additional props or behavior. Example: withAuth(Component). HOCs were common before hooks but are now largely replaced by custom hooks for logic reuse.",
    "topic": "React"
  },
  {
    "front": "What is the render props pattern?",
    "back": "A technique where a component receives a function as a prop (often called 'render' or 'children') and calls it to determine what to render. Like HOCs, this pattern has been mostly replaced by custom hooks.",
    "topic": "React"
  },
  {
    "front": "How do you prevent a child component from re-rendering unnecessarily?",
    "back": "Wrap the child in React.memo, ensure props are stable (use useMemo for objects/arrays and useCallback for functions passed as props), or restructure so the child doesn't receive new references on every parent render.",
    "topic": "React"
  },
  {
    "front": "What is a pure component in React?",
    "back": "A component that always renders the same output for the same props and state, with no side effects during rendering. React can safely skip re-rendering pure components when their inputs haven't changed.",
    "topic": "React"
  },
  {
    "front": "What is strict mode in React and what does it do?",
    "back": "React.StrictMode is a development-only wrapper that helps find bugs by intentionally double-invoking certain functions (renders, effects, reducers) to expose impure logic, and warns about deprecated APIs.",
    "topic": "React"
  },
  {
    "front": "Why does React StrictMode double-render components in development?",
    "back": "To help detect impure rendering logic and unexpected side effects. If your component produces different results on the second call, it has a bug. This only happens in development mode and has no effect in production.",
    "topic": "React"
  }
];


// === SPACED REPETITION ===
const STORAGE = 'js-fc-v2';
const STREAK_KEY = 'js-fc-streak';
const MODE_KEY = 'js-fc-mode';

function loadProgress() { try { return JSON.parse(localStorage.getItem(STORAGE)) || {}; } catch { return {}; } }
function saveProgress() { localStorage.setItem(STORAGE, JSON.stringify(progress)); }

let progress = loadProgress();
let currentFilter = 'all';
let deck = [];
let currentIndex = 0;
let isFlipped = false;
let currentMode = localStorage.getItem(MODE_KEY) || 'classic';
let sessionStats = { reviewed: 0, good: 0, hard: 0, again: 0, quizCorrect: 0, quizTotal: 0 };
let quizAnswered = false;
let typeSubmitted = false;

function getScore(id) { return progress[id] || { s: 0, r: 0, t: 0 }; }

// SM-2 inspired: prioritise cards you got wrong, then unreviewed, then due for review
function buildDeck() {
  let cards = currentFilter === 'all' ? [...ALL_CARDS] : ALL_CARDS.filter(c => c.topic === currentFilter);
  const now = Date.now();
  cards.sort((a, b) => {
    const sa = getScore(a.front), sb = getScore(b.front);
    const prioA = sa.r > 0 && sa.s === 0 ? -1000 : sa.r === 0 ? -500 : sa.s;
    const prioB = sb.r > 0 && sb.s === 0 ? -1000 : sb.r === 0 ? -500 : sb.s;
    return prioA - prioB;
  });
  return cards;
}

// === STREAK ===
function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY)) || { count: 0, lastDate: '' }; } catch { return { count: 0, lastDate: '' }; }
}
function updateStreak() {
  const streak = loadStreak();
  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (streak.lastDate === today) return streak;
  if (streak.lastDate === yesterday) { streak.count++; } else if (streak.lastDate !== today) { streak.count = 1; }
  streak.lastDate = today;
  localStorage.setItem(STREAK_KEY, JSON.stringify(streak));
  return streak;
}
function showStreak() {
  const s = loadStreak();
  document.getElementById('streak-count').textContent = s.count;
  document.getElementById('streak-icon').textContent = s.count >= 7 ? '\u{1F525}' : s.count >= 3 ? '\u{1F525}' : '\u{1F4A1}';
  document.getElementById('streak-label').textContent = s.count >= 7 ? 'On fire!' : s.count >= 3 ? 'Keep going!' : '';
}

// === TOAST FEEDBACK ===
function showToast(type, customText) {
  const el = document.getElementById('toast');
  const msgs = { 0: ['Try again', 'toast-again'], 1: ['Getting there', 'toast-hard'], 2: ['Nailed it!', 'toast-good'] };
  if (customText) {
    el.textContent = customText;
    el.className = 'toast ' + (type === 'correct' ? 'toast-correct' : 'toast-wrong') + ' show';
  } else {
    const [text, cls] = msgs[type];
    el.textContent = text;
    el.className = 'toast ' + cls + ' show';
  }
  setTimeout(() => { el.className = 'toast'; }, 600);
}

// === MODE SWITCHER ===
function setMode(mode) {
  currentMode = mode;
  localStorage.setItem(MODE_KEY, mode);
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === mode);
  });
  // Update kbd hints
  const hints = document.getElementById('kbd-hints');
  if (mode === 'classic') {
    hints.innerHTML = '<kbd>Space</kbd> flip &nbsp; <kbd>1</kbd> again &nbsp; <kbd>2</kbd> hard &nbsp; <kbd>3</kbd> good';
  } else if (mode === 'quiz') {
    hints.innerHTML = '<kbd>1</kbd>-<kbd>4</kbd> select answer';
  } else {
    hints.innerHTML = '<kbd>Enter</kbd> submit &nbsp; <kbd>1</kbd> again &nbsp; <kbd>2</kbd> hard &nbsp; <kbd>3</kbd> good';
  }
  showCurrentCard();
}

// === DIFFICULTY BADGE HELPER ===
function setDiffBadge(el, front) {
  const score = getScore(front);
  if (score.r === 0) { el.textContent = 'New'; el.className = 'card-difficulty diff-new'; }
  else if (score.s < 3) { el.textContent = 'Learning'; el.className = 'card-difficulty diff-learning'; }
  else { el.textContent = 'Known'; el.className = 'card-difficulty diff-known'; }
}

// === APP ===
function initApp() {
  const topics = [...new Set(ALL_CARDS.map(c => c.topic))];
  const f = document.getElementById('filters');
  f.innerHTML = '<button class="filter-btn active" onclick="setFilter(\'all\')">All (' + ALL_CARDS.length + ')</button>';
  topics.forEach(t => {
    const n = ALL_CARDS.filter(c => c.topic === t).length;
    f.innerHTML += '<button class="filter-btn" onclick="setFilter(\'' + t.replace(/'/g, "\\'") + '\')">' + t + ' (' + n + ')</button>';
  });
  deck = buildDeck();
  currentIndex = 0;
  sessionStats = { reviewed: 0, good: 0, hard: 0, again: 0, quizCorrect: 0, quizTotal: 0 };
  // Restore mode
  setMode(currentMode);
  updateStats();
  showStreak();
}

function setFilter(topic) {
  currentFilter = topic;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', (topic === 'all' && btn.textContent.startsWith('All')) || btn.textContent.startsWith(topic));
  });
  deck = buildDeck();
  currentIndex = 0;
  sessionStats = { reviewed: 0, good: 0, hard: 0, again: 0, quizCorrect: 0, quizTotal: 0 };
  document.getElementById('summary').style.display = 'none';
  showCurrentCard();
  updateStats();
}

function hideAllAreas() {
  document.getElementById('classic-area').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('type-area').style.display = 'none';
  document.getElementById('type-actions').style.display = 'none';
}

function showCurrentCard() {
  if (currentIndex >= deck.length) { showSummary(); return; }
  document.getElementById('summary').style.display = 'none';
  hideAllAreas();

  if (currentMode === 'classic') showClassicCard();
  else if (currentMode === 'quiz') showQuizCard();
  else if (currentMode === 'type') showTypeCard();
}

// === CLASSIC MODE ===
function showClassicCard() {
  const area = document.getElementById('classic-area');
  area.style.display = 'flex';

  const card = deck[currentIndex];
  document.getElementById('card-front').textContent = card.front;
  document.getElementById('card-back').textContent = card.back;
  document.getElementById('card-topic').textContent = card.topic;
  document.getElementById('card-topic-back').textContent = card.topic;
  document.getElementById('card-number').textContent = (currentIndex + 1) + ' / ' + deck.length;
  setDiffBadge(document.getElementById('card-diff'), card.front);

  isFlipped = false;
  document.getElementById('card').className = 'card';
  document.getElementById('actions').style.display = 'none';
}

function flipCard() {
  if (currentMode !== 'classic') return;
  if (currentIndex >= deck.length) return;
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped');
  document.getElementById('actions').style.display = isFlipped ? 'flex' : 'none';
}

// === QUIZ MODE ===
function showQuizCard() {
  const area = document.getElementById('quiz-area');
  area.style.display = 'flex';
  quizAnswered = false;

  const card = deck[currentIndex];
  document.getElementById('quiz-question').textContent = card.front;
  document.getElementById('quiz-topic').textContent = card.topic;
  document.getElementById('quiz-number').textContent = (currentIndex + 1) + ' / ' + deck.length;
  setDiffBadge(document.getElementById('quiz-diff'), card.front);

  // Generate 4 options: correct + 3 distractors
  const correctAnswer = card.back;
  let distractorPool = ALL_CARDS.filter(c => c.front !== card.front);
  // Prefer same topic distractors
  let sameTopic = distractorPool.filter(c => c.topic === card.topic);
  if (sameTopic.length < 3) sameTopic = distractorPool;
  // Shuffle and pick 3
  shuffleArray(sameTopic);
  const distractors = sameTopic.slice(0, 3).map(c => c.back);

  const options = [correctAnswer, ...distractors];
  shuffleArray(options);

  const optionsEl = document.getElementById('quiz-options');
  optionsEl.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.dataset.correct = opt === correctAnswer ? 'true' : 'false';
    btn.onclick = () => handleQuizAnswer(btn, opt === correctAnswer);
    optionsEl.appendChild(btn);
  });
}

function handleQuizAnswer(btn, isCorrect) {
  if (quizAnswered) return;
  quizAnswered = true;

  sessionStats.quizTotal++;
  const allBtns = document.querySelectorAll('.quiz-option');

  if (isCorrect) {
    sessionStats.quizCorrect++;
    btn.classList.add('correct');
    showToast('correct', 'Correct!');
    // Auto-advance
    allBtns.forEach(b => b.classList.add('disabled'));
    setTimeout(() => {
      // Auto-rate as "good" for quiz
      rateCard(2);
    }, 800);
  } else {
    btn.classList.add('wrong');
    // Highlight correct
    allBtns.forEach(b => {
      if (b.dataset.correct === 'true') b.classList.add('correct');
      b.classList.add('disabled');
    });
    showToast('wrong', 'Wrong');
    setTimeout(() => {
      // Auto-rate as "again" for wrong quiz answer
      rateCard(0);
    }, 1500);
  }
}

// === TYPE MODE ===
function showTypeCard() {
  const area = document.getElementById('type-area');
  area.style.display = 'flex';
  typeSubmitted = false;

  const card = deck[currentIndex];
  document.getElementById('type-question').textContent = card.front;
  document.getElementById('type-topic').textContent = card.topic;
  document.getElementById('type-number').textContent = (currentIndex + 1) + ' / ' + deck.length;
  setDiffBadge(document.getElementById('type-diff'), card.front);

  // Reset input state
  document.getElementById('type-input-row').style.display = 'flex';
  document.getElementById('type-result').style.display = 'none';
  document.getElementById('type-actions').style.display = 'none';
  const input = document.getElementById('type-input');
  input.value = '';
  setTimeout(() => input.focus(), 100);
}

function submitTypeAnswer() {
  if (typeSubmitted) return;
  typeSubmitted = true;

  const card = deck[currentIndex];
  const userAnswer = document.getElementById('type-input').value.trim();
  const correctAnswer = card.back;

  // Fuzzy match
  const stopWords = new Set(['the', 'and', 'that', 'this', 'with', 'from', 'when', 'which', 'because', 'returns', 'function', 'for', 'are', 'not', 'but', 'its', 'can', 'has', 'was', 'you', 'all', 'will', 'each', 'than', 'into', 'only', 'like', 'use', 'used', 'does']);
  const extractTerms = (text) => {
    return text.toLowerCase()
      .replace(/[^a-z0-9\s]/g, ' ')
      .split(/\s+/)
      .filter(w => w.length >= 4 && !stopWords.has(w));
  };

  const correctTerms = [...new Set(extractTerms(correctAnswer))];
  const userLower = userAnswer.toLowerCase();

  const matched = [];
  const missed = [];
  correctTerms.forEach(term => {
    if (userLower.includes(term)) matched.push(term);
    else missed.push(term);
  });

  const total = correctTerms.length || 1;
  const matchCount = matched.length;

  // Show results
  document.getElementById('type-input-row').style.display = 'none';
  document.getElementById('type-result').style.display = 'flex';
  document.getElementById('type-actions').style.display = 'flex';

  // Match score
  const scoreColor = matchCount >= total * 0.7 ? '#4ecdc4' : matchCount >= total * 0.4 ? '#f59e0b' : '#dc2626';
  document.getElementById('type-match-score').innerHTML =
    '<span style="color:' + scoreColor + '">You got ' + matchCount + '/' + total + ' key concepts</span>';

  // User answer display
  document.getElementById('type-yours-text').textContent = userAnswer || '(no answer)';

  // Correct answer with highlighted terms
  let highlighted = correctAnswer;
  // Highlight matched terms in green, missed in amber
  matched.forEach(term => {
    const regex = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    highlighted = highlighted.replace(regex, '<span class="term-matched">$1</span>');
  });
  missed.forEach(term => {
    const regex = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    highlighted = highlighted.replace(regex, '<span class="term-missed">$1</span>');
  });
  document.getElementById('type-correct-text').innerHTML = highlighted;
}

// === RATING (shared across modes) ===
function rate(score) {
  rateCard(score);
}

function rateCard(score) {
  const card = deck[currentIndex];
  const prev = getScore(card.front);
  progress[card.front] = {
    s: score === 0 ? 0 : Math.min(prev.s + score, 6),
    r: prev.r + 1,
    t: Date.now()
  };
  saveProgress();

  // Session stats
  sessionStats.reviewed++;
  if (score === 0) sessionStats.again++;
  else if (score === 1) sessionStats.hard++;
  else sessionStats.good++;

  // Toast (for classic and type modes)
  if (currentMode === 'classic') showToast(score);

  // If "again", push to back
  if (score === 0) deck.push(card);

  if (currentMode === 'classic') {
    // Animate card out
    const cardEl = document.getElementById('card');
    cardEl.classList.add(score >= 1 ? 'swipe-right' : 'swipe-left');
    setTimeout(() => {
      currentIndex++;
      showCurrentCard();
      updateStats();
    }, 250);
  } else {
    currentIndex++;
    showCurrentCard();
    updateStats();
  }

  // Update streak on first review of the day
  if (sessionStats.reviewed === 1) { updateStreak(); showStreak(); }
}

function updateStats() {
  let know = 0, learning = 0, remaining = 0;
  const cards = currentFilter === 'all' ? ALL_CARDS : ALL_CARDS.filter(c => c.topic === currentFilter);
  cards.forEach(c => {
    const s = getScore(c.front);
    if (s.s >= 3) know++;
    else if (s.r > 0) learning++;
    else remaining++;
  });
  document.getElementById('know-count').textContent = know;
  document.getElementById('learning-count').textContent = learning;
  document.getElementById('remaining-count').textContent = remaining;
  document.getElementById('progress').style.width = ((know / (cards.length || 1)) * 100) + '%';
}

function showSummary() {
  hideAllAreas();
  const s = document.getElementById('summary');
  s.style.display = 'block';

  const pct = sessionStats.reviewed > 0 ? Math.round((sessionStats.good / sessionStats.reviewed) * 100) : 0;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-label').textContent = currentMode === 'quiz' ? 'quiz accuracy' : 'cards rated "Good"';
  document.getElementById('s-reviewed').textContent = sessionStats.reviewed;
  document.getElementById('s-good').textContent = sessionStats.good;
  document.getElementById('s-hard').textContent = sessionStats.hard;
  document.getElementById('s-again').textContent = sessionStats.again;

  // Quiz accuracy row
  const quizRow = document.getElementById('quiz-accuracy-row');
  if (currentMode === 'quiz' && sessionStats.quizTotal > 0) {
    quizRow.style.display = 'flex';
    const qAcc = Math.round((sessionStats.quizCorrect / sessionStats.quizTotal) * 100);
    document.getElementById('s-quiz-acc').textContent = qAcc + '%';
  } else {
    quizRow.style.display = 'none';
  }

  const msg = pct >= 80 ? "Crushing it! You're interview-ready on these cards." :
              pct >= 50 ? "Good progress. Review the weak cards to lock them in." :
              "Keep going \u2014 repetition is how this sticks. Hit 'Review Weak Cards'.";
  document.getElementById('s-msg').textContent = msg;
}

function resetSession() {
  currentIndex = 0;
  deck = buildDeck();
  sessionStats = { reviewed: 0, good: 0, hard: 0, again: 0, quizCorrect: 0, quizTotal: 0 };
  document.getElementById('summary').style.display = 'none';
  showCurrentCard();
  updateStats();
}

function studyWeakest() {
  const cards = currentFilter === 'all' ? ALL_CARDS : ALL_CARDS.filter(c => c.topic === currentFilter);
  deck = cards.filter(c => { const s = getScore(c.front); return s.r > 0 && s.s < 3; });
  if (deck.length === 0) { deck = cards.filter(c => getScore(c.front).r === 0).slice(0, 20); }
  currentIndex = 0;
  sessionStats = { reviewed: 0, good: 0, hard: 0, again: 0, quizCorrect: 0, quizTotal: 0 };
  document.getElementById('summary').style.display = 'none';
  showCurrentCard();
  updateStats();
}

// === SHUFFLE HELPER ===
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// === SWIPE GESTURES (mobile, classic mode only) ===
let touchStartX = 0;
document.getElementById('card-container').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('card-container').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 80 && isFlipped && currentMode === 'classic') {
    if (dx > 0) rate(2);  // swipe right = good
    else rate(0);          // swipe left = again
  }
}, { passive: true });

// === KEYBOARD ===
document.addEventListener('keydown', e => {
  if (currentMode === 'classic') {
    if (e.code === 'Space') { e.preventDefault(); flipCard(); }
    if (e.key === '1' && isFlipped) rate(0);
    if (e.key === '2' && isFlipped) rate(1);
    if (e.key === '3' && isFlipped) rate(2);
    if (e.key === 'ArrowRight') { currentIndex++; showCurrentCard(); }
    if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; showCurrentCard(); }
  } else if (currentMode === 'quiz') {
    if (!quizAnswered && e.key >= '1' && e.key <= '4') {
      const btns = document.querySelectorAll('.quiz-option');
      const idx = parseInt(e.key) - 1;
      if (btns[idx]) btns[idx].click();
    }
  } else if (currentMode === 'type') {
    if (!typeSubmitted && e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submitTypeAnswer();
    }
    if (typeSubmitted) {
      if (e.key === '1') rate(0);
      if (e.key === '2') rate(1);
      if (e.key === '3') rate(2);
    }
  }
});

// === INIT ===
initApp();
</script>
